<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Echo of Abyss — Task Tracker</title>
<style>
  :root {
    --bg: #1a1a1f; --panel: #23232a; --border: #33333d; --text: #e6e6ea;
    --muted: #8a8a96; --accent: #b48cff; --active: #6cd49a; --done: #6a6a76;
    --backlog: #d4a76c;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, system-ui, sans-serif;
         background: var(--bg); color: var(--text); }
  header { padding: 16px 24px; border-bottom: 1px solid var(--border);
           display: flex; align-items: center; gap: 16px; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .count { color: var(--muted); font-size: 13px; }
  .controls { padding: 12px 24px; border-bottom: 1px solid var(--border);
              display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .controls input, .controls select {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 10px; font: inherit;
  }
  .controls input { min-width: 240px; }
  .tabs { display: flex; gap: 4px; }
  .tab { background: transparent; color: var(--muted); border: 1px solid var(--border);
         border-radius: 4px; padding: 6px 12px; cursor: pointer; font: inherit; }
  .tab.on { background: var(--panel); color: var(--text); border-color: var(--accent); }
  main { padding: 16px 24px; max-width: 1100px; }
  .task { background: var(--panel); border: 1px solid var(--border);
          border-radius: 6px; margin-bottom: 8px; overflow: hidden; }
  .task-head { padding: 10px 14px; cursor: pointer; display: flex;
               align-items: center; gap: 10px; }
  .task-head:hover { background: #2a2a32; }
  .id { color: var(--muted); font-family: ui-monospace, monospace; font-size: 12px;
        min-width: 38px; }
  .title { flex: 1; font-weight: 500; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 10px;
          border: 1px solid var(--border); color: var(--muted); }
  .pill.status-active { color: var(--active); border-color: var(--active); }
  .pill.status-backlog { color: var(--backlog); border-color: var(--backlog); }
  .pill.status-done { color: var(--done); }
  .dates { color: var(--muted); font-size: 12px; min-width: 90px; text-align: right; }
  .body { padding: 0 14px 14px 60px; border-top: 1px solid var(--border);
          display: none; color: #cfcfd6; }
  .body.on { display: block; }
  .body h1, .body h2, .body h3 { color: var(--text); margin: 14px 0 6px; }
  .body h1 { font-size: 16px; } .body h2 { font-size: 14px; }
  .body h3 { font-size: 13px; color: var(--accent); }
  .body code { background: #2c2c34; padding: 1px 5px; border-radius: 3px;
               font-family: ui-monospace, monospace; font-size: 12px; }
  .body pre { background: #15151a; padding: 10px; border-radius: 4px; overflow-x: auto; }
  .body pre code { background: none; padding: 0; }
  .body ul, .body ol { padding-left: 22px; }
  .body a { color: var(--accent); }
  .empty { color: var(--muted); padding: 32px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>Echo of Abyss — Task Tracker</h1>
  <span class="count" id="count"></span>
</header>
<div class="controls">
  <input id="q" type="text" placeholder="search title or body…" autofocus>
  <select id="area"><option value="">all areas</option></select>
  <div class="tabs">
    <button class="tab on" data-status="active">Active</button>
    <button class="tab" data-status="backlog">Backlog</button>
    <button class="tab" data-status="done">Done</button>
    <button class="tab" data-status="all">All</button>
  </div>
</div>
<main id="list"></main>
<script>
const TASKS = [{"id": "\"000\"", "title": "Bootstrap local task tracker", "status": "done", "area": "meta", "priority": "normal", "started": "2026-05-06", "finished": "2026-05-06", "file": "000-bootstrap-tracker.md", "body": "## Description\n\nSet up a local, file-backed task tracker that AI tools (Claude Code) can manage and a human can review. Goal: lightweight Jira-alternative — markdown source of truth, HTML viewer, no server, no cloud.\n\n## Work log\n\n- 2026-05-06: agreed on the design — one markdown file per task in `tasks/`, `TASKS.md` index regenerated by a build script, self-contained `tasks.html` viewer.\n- 2026-05-06: wrote `build_tasks_html.py` (parses frontmatter, regenerates `TASKS.md` and `tasks.html`).\n- 2026-05-06: added `/task-start` and `/task-done` slash commands.\n- 2026-05-06: wired `PostToolUse` hook in `.claude/settings.json` so the HTML refreshes whenever a task file is edited.\n\n## Summary\n\nTracker is live. Schema: `id`, `title`, `status` (active/backlog/done), `area`, `priority`, `started`, `finished` in frontmatter; body has `## Description`, `## Work log`, `## Summary`. Use `/task-start <title>` to open, `/task-done <id>` to close. Open `tasks/tasks.html` in a browser to review."}, {"id": "\"001\"", "title": "Korrath Phase 1 — Armour, Armour Break, Formation core mechanics", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-06", "finished": "2026-05-06", "file": "001-korrath-phase-1-core-mechanics.md", "body": "## Description\n\nFoundation work for the Korrath hero: introduce the Armour stat (physical damage reduction with min-100 floor, spells bypass), the Armour Break stackable debuff (strips Armour first, overflow becomes flat physical damage), and the Formation keyword (one-time trigger per same-race adjacent pair). All three need full sim parity and test coverage in `CardEffectTests.gd` before any Korrath content is wired up.\n\n## Work log\n\n- 2026-05-06: opened. Plan derived from `design/KORRATH_HERO_DESIGN`. Touches `MinionInstance.gd`, `MinionCardData.gd`, `CombatManager._deal_damage`, `Enums.gd` (new `BuffType.ARMOUR_BREAK`, `Keyword.FORMATION`), `BuffSystem.gd`, plus symmetric handler registration in `CombatSetup.gd` and `SimTriggerSetup.gd`.\n- 2026-05-06: closed.\n\n## Summary\n\nShipped the three Korrath foundations: `armour: int` field on `MinionInstance` (with `add_armour()` helper that pre-wires Phase 3 T3 doubling via `scene._armour_doubled_on_knight`), `BuffType.ARMOUR_BREAK` as a stackable debuff routed through `BuffSystem` (also added to `DEBUFF_TYPES` for cleanse), and a keyword-driven `FORMATION` trigger in `CombatHandlers.on_minion_summoned_formation` registered as a shared always-on handler in `CombatSetup` (sim parity inherits via `SimTriggerSetup` delegation). `CombatManager._deal_damage` now applies the armour math (AB strips armour first, overflow becomes flat bonus damage, min-100 floor only when armour or AB is present, spells bypass entirely) and exposes `last_post_armour_damage` so PIERCE overkill carries the *landed* damage to the hero, not the raw atk value. 22 new test assertions in `DamageTypeTests` (Phase 8 — Korrath Armour) and `TriggerHandlerTests` (Formation section) all pass; pre-existing 543 assertions unchanged (3 KNOWN BUG failures predate this work).\n\nFollow-ups: Phase 2 (task 002) — register Korrath in `HeroDatabase`, add textless Abyssal Knight card, wire `iron_legion` 4-copy cap and `abyssal_commander` cost discount."}, {"id": "\"002\"", "title": "Korrath Phase 2 — hero registration and Abyssal Knight card", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-06", "finished": "2026-05-06", "file": "002-korrath-phase-2-hero-shell.md", "body": "## Description\n\nRegister Korrath in `HeroDatabase` with the `abyssal_commander` (knight costs 1 less) and `iron_legion` (up to 4 copies in deck) passives, plus the three branch IDs. Add the textless `abyssal_knight` card (4E / 400 / 500) to `CardDatabase` — base stats only, all behavior driven by talent overrides. Wire `iron_legion` into the deck-builder copy-cap rules and `abyssal_commander` into `CardModRules` cost_delta.\n\n## Work log\n\n- 2026-05-06: opened. Gated on Phase 1 (task 001). Files: `HeroDatabase.gd`, `DeckBuilderScene.gd:_EXTRA_COPY_RULES`, `CardModRules.gd`, `CardDatabase.gd`.\n- 2026-05-06: closed.\n\n## Summary\n\nKorrath is now a selectable hero. Registered `_register_korrath()` in `HeroDatabase` with `abyssal_commander` and `iron_legion` passives, plus the three branch IDs (`infernal_bulwark`, `runic_knight`, `abyssal_breaker`) — each branch gets a display name and one-line description in `TalentDatabase`. Added the textless `abyssal_knight` card (4E / 400 ATK / 500 HP, abyss_core pool, \"abyssal_knight\" tag) — `minion_type` defaults to DEMON since the field is required, but each branch's T0 talent override will replace it with the branch-appropriate race in Phase 3+. Wired `iron_legion` into `DeckBuilderScene._EXTRA_COPY_RULES` so the knight's deck cap is 4 instead of 2, and `abyssal_commander` into `CardModRules` as a tag-filtered `cost_delta: -1` rule (knight resolves at 3E in combat). 17 new test assertions added, all green; 543 pre-existing assertions unchanged.\n\nFollow-ups: art assets (portrait, combat portrait, knight art) — `art_path` is empty everywhere and the hero-select scene will fall back to placeholder rendering. Phase 3 (task 003) wires Branch 1 — Infernal Bulwark talents on top of this scaffolding."}, {"id": "\"003\"", "title": "Korrath Branch 1 — Infernal Bulwark talents", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-06", "finished": "2026-05-06", "file": "003-korrath-branch-1-infernal-bulwark.md", "body": "## Description\n\nImplement all four tiers of Branch 1 (Human formation / armour stacking / Guard capstone). T0 `iron_formation` makes the knight Human and grants Formation +200 Armour/+200 HP on first Human pair. T1 `commanders_reach` aura applies 100 Armour Break to attack targets via adjacent friendly Humans. T2 `iron_resolve` is a live passive — friendly Humans gain ATK = current Armour (derived in `MinionInstance.effective_atk`). T3 `unbreakable` capstone grants Guard and doubles all knight Armour gains.\n\n## Work log\n\n- 2026-05-06: opened. Gated on Phases 1 and 2. Mostly declarative via `talent_overrides` and `CardModRules`. T2 needs a scene flag pattern mirroring `corruption_inverts_on_friendly_demons`. T3 doubling needs a single `MinionInstance.add_armour()` helper to centralize armour mutations.\n- 2026-05-06: closed.\n\n## Summary\n\nAll four Infernal Bulwark talents shipped. T0 `iron_formation` and T3 `unbreakable` are pure declarative — `talent_overrides` on the Abyssal Knight set `minion_type=HUMAN`, FORMATION (and GUARD on T3) keywords, and `formation_effect_steps` (BUFF_ARMOUR +200 + BUFF_HP +200 SELF). T1 `commanders_reach` is a `ON_PLAYER_ATTACK` handler that applies 100 Armour Break to the defender when the attacker is a friendly Human adjacent to a friendly Abyssal Knight; T2 `iron_resolve` is a static flag on `MinionInstance` (mirroring Seris's corruption-inversion pattern) that adds the minion's current armour to its `effective_atk()` for friendly Humans. Three pieces of new infrastructure were needed: `EffectStep.BUFF_ARMOUR` (routes through the existing `add_armour()` helper so T3's doubling check stays centralized), `ON_PLAYER_ATTACK` is now actually fired from `CombatManager.resolve_minion_attack` / `resolve_minion_attack_hero` with a new `EventContext.defender` field, and `talent_overrides` keyword/array assignment now goes through the typed-array path (Godot 4 silently rejects untyped Array → Array[int] via `set()`). 15 new test assertions, all green; pre-existing 543 unchanged.\n\nFollow-ups: branch icon art (`icon_path` empty on all four talents). The `ON_PLAYER_ATTACK` infrastructure paves the way for Branch 3 T1 `abyssal_strike` (Corruption-on-attack) and T2 `path_of_destruction` (Demon-attacks-apply-AB) in task 004."}, {"id": "\"004\"", "title": "Korrath Branch 3 — Abyssal Breaker talents", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-06", "finished": "2026-05-06", "file": "004-korrath-branch-3-abyssal-breaker.md", "body": "## Description\n\nImplement all four tiers of Branch 3 (Demon knight / corruption strips Armour / Armour Break stacking / spell explosion capstone). T0 `corrupting_presence` retags the knight Demon and makes each corruption stack reduce target Armour by 100. T1 `abyssal_strike` applies 1 Corruption per knight attack (incl. enemy hero). T2 forks into sibling talents — `path_of_ruination` (spells apply Corruption + corruption amplifies spell damage by 100 per stack) and `path_of_destruction` (friendly Demon attacks apply 50 Armour Break). T3 `armour_explosion` capstone: on enemy minion death, deal spell damage equal to that minion's accumulated Armour Break to all enemies.\n\n## Work log\n\n- 2026-05-06: opened. Built before Branch 2 because corruption + AB are direct extensions of Phase 1, no new infra. T2 sibling-talent pattern (two IDs, only one selectable) is the model for Branch 2 T2 as well. T3 needs to snapshot dead minion's AB stacks before BuffSystem clears them.\n- 2026-05-06: closed.\n\n## Summary\n\nAll five Abyssal Breaker talents shipped. T0 `corrupting_presence` retags the knight Demon (declarative `talent_overrides`) and adds a corruption-as-armour-erosion path to `CombatManager._deal_damage` (gated by `_corrupting_presence_active`, player-side only — counts CORRUPTION buff entries via `count_type`, not `sum_type`, since each entry stores per-stack ATK penalty as `amount`). T1 `abyssal_strike` and T2 `path_of_destruction` are `ON_PLAYER_ATTACK` handlers that filter on attacker (knight / Demon) and apply Corruption / 50 AB to the defender. T2 `path_of_ruination` lives entirely in `EffectResolver._apply` for `DAMAGE_MINION` — pre-damage amplification reads target's pre-application Corruption stack count (+100/stack), post-damage application adds 1 stack (skipped if the target died); this also makes AOE spells naturally hit each target once. T3 `armour_explosion` snapshots the dead enemy's AB sum on `ON_ENEMY_MINION_DIED` and deals it as spell damage to the remaining enemy board. Sibling T2 talents (path_of_ruination + path_of_destruction) both require T1 and both belong to `abyssal_breaker` branch; the four-pick budget naturally limits the player to one. 14 new test assertions, all green; pre-existing 578 unchanged.\n\nFollow-ups: branch icon art (all `icon_path` empty). Hero AB / Corruption is not modeled (handler no-ops on hero defenders) — design says abyssal_strike applies Corruption to the enemy hero too; revisit when hero-state expands. T3 prereq is `abyssal_strike` not either T2 sibling because `TalentData.requires` holds a single string — fragile if a player skips T2, but the four-pick budget makes it unlikely in practice."}, {"id": "\"005\"", "title": "Korrath Branch 2 — Runic Knight talents (T3 deferred)", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-06", "finished": "2026-05-06", "file": "005-korrath-branch-2-runic-knight.md", "body": "## Description\n\nMost complex branch. T0 `runic_transcendence` gives the knight both Human and Demon race tags and places a random Rune on attack — needs an architectural decision on whether `MinionInstance.minion_type` becomes a flag-set / array (audit every `== MinionType.X` read site) or we add a parallel `extra_types` field. T1 `runic_absorption` destroys a random rune when board is full and grants its aura permanently to a random Abyssal Knight (reuses Seris's `aura_tags` accumulator pattern). T2 sibling talents: `path_of_demons` (Demon summon → 50 dmg × X repeated X times) and `path_of_humans` (Human summon → +50 ATK × X repeated X times) where X = active rune slots + total absorbed aura stacks across knights.\n\nT3 `grand_ritual_chaos` is **deferred** — needs a new `RitualVariance` resource type with min/max ranges per effect and post-resolution Enhanced selection. Will spin out into its own task.\n\n## Work log\n\n- 2026-05-06: opened. Gated on Phases 1, 2, and ideally task 004 (sibling-talent T2 pattern). Dual-race tagging is the architectural hinge — flag scope to user before committing.\n- 2026-05-06: closed.\n\n## Summary\n\nT0/T1/T2 of Branch 2 shipped; T3 grand_ritual_chaos still deferred. The architectural hinge — dual-race tagging — was resolved by adding `extra_minion_types: Array[int]` and an `is_race(type)` / `shares_race(other)` helper to `MinionCardData`, then migrating ~60 `minion_type ==`/`!=` call sites across combat, effects, sim, AI profiles, and CardModRules to use `is_race()`. The migration ran clean with zero regressions in the existing 592-assertion suite, which validates that the helper is the right primitive. T0 `runic_transcendence` is two halves: declarative `talent_overrides` add DEMON to the knight's `extra_minion_types`, and an `ON_PLAYER_ATTACK` handler places a random rune via the new `CombatState._korrath_place_random_rune()`. T1 `runic_absorption` plugs into that helper — when the rune board is full it picks a random active rune, removes it (full aura cleanup via existing `_remove_rune_aura`), and appends its rune id to a random friendly knight's `aura_tags` (Seris's accumulator pattern). T2 sibling talents `path_of_demons` and `path_of_humans` listen on `ON_PLAYER_MINION_SUMMONED` and fire 50 dmg / +50 ATK in a loop scaled by X = active rune slots + total absorbed-aura stacks across friendly knights. 17 new test assertions, all green; 592 pre-existing unchanged.\n\nFollow-ups: T3 `grand_ritual_chaos` capstone needs a new `RitualVariance` resource type with min/max ranges per effect and post-resolution Enhanced selection — open a fresh task when ready. Branch icon art is also still empty across all four talents. Hero-target rune placement / hero corruption gaps from earlier branches still apply."}, {"id": "\"006\"", "title": "Korrath AI profile and starter decks", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-06", "finished": "2026-05-06", "file": "006-korrath-balance-pass.md", "body": "## Description\n\nNarrowed scope (was: balance + AI + decks + art): build a `KorrathPlayerProfile.gd` so the sim can pilot a Korrath deck, and wire two starter-deck presets (Human-leaning for Infernal Bulwark / Runic Knight, Demon-leaning for Abyssal Breaker) into `PresetDecks.gd`. Balance pass and art split into separate tasks.\n\n## Work log\n\n- 2026-05-06: opened. Final polish phase, gated on all prior Korrath tasks.\n- 2026-05-06: rescoped to AI profile + starter decks; balance pass + art moved to follow-up tasks.\n- 2026-05-06: closed.\n\n## Summary\n\nKorrath is now fully playable end-to-end. `KorrathPlayerProfile.gd` (branch-agnostic baseline) plays the knight first as the centerpiece, runs essence-first resource growth (matches Vael's Swarm / Seris's Fleshcraft pattern), and is registered in `CombatSim._PLAYER_PROFILES` under the `\"korrath\"` id. Two starter decks land in `PresetDecks.gd`: **Iron Legion** (Human-heavy frame, Bulwark / Runic-Human path) and **Abyssal Vanguard** (Demon-heavy frame, Breaker path) — both 15 cards drawn from `abyss_core` + `neutral_core` pools, with 4× knight as the anchor (iron_legion passive raises the cap). Two `ScenarioTests` smoke probes pilot both decks through full matches vs feral_pack; total assertions now 617 (+8), pre-existing 3 KNOWN BUG failures unchanged.\n\nFollow-ups: actual balance pass — run `BalanceSimBatch.tscn` across the Act 1/2 encounter matrix with Korrath profiles, identify outlier branches/talents (especially T2 sibling balance and T3 capstone power), tune numbers. Open as task 007. Branch-specific player profiles (Bulwark / Breaker / Runic subclasses, à la `FleshcraftPlayerProfile`) only when balance sim shows the baseline plays a branch poorly. Branch icon art + Korrath portrait (currently `art_path = \"\"` everywhere) — open as task 008. A Korrath-specific support card pool also stays out of scope; the existing pools work but synergy is thin."}, {"id": "\"007\"", "title": "Hero Armour and Armour Break — extend Korrath stats to player/enemy heroes", "status": "backlog", "area": "combat", "priority": "normal", "started": "", "finished": "", "file": "007-hero-armour-and-armour-break.md", "body": "## Description\n\nToday Armour and Armour Break only exist on minions. Korrath talents that target heroes (`commanders_reach`, `abyssal_strike`, `path_of_destruction`) all early-return when the defender is the hero sentinel. This task extends both stats to heroes: state fields on `CombatState`, hero-side armour math in `apply_hero_damage` for `DamageSource.MINION`, hero-defender code paths in the three handlers, and Armour / AB badges on `PlayerHeroPanel` / `EnemyHeroPanel`. Open design questions to settle first: starting hero armour (probably 0), whether enemy bosses can ship with armour as a balance lever, AB cap on heroes, and whether AB on heroes should decay or persist.\n\n## Work log\n\n- 2026-05-08: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"008\"", "title": "Korrath card pools — content design and authoring", "status": "done", "area": "content", "priority": "normal", "started": "2026-05-08", "finished": "2026-05-12", "file": "008-korrath-card-pools-content.md", "body": "## Description\n\nKorrath has no support card pools yet. Both starter decks (`korrath_iron_legion`, `korrath_abyssal_vanguard`) draw entirely from `abyss_core` + `neutral_core`, which works but leaves Korrath thin on synergy. Author four pools mirroring the Vael/Seris pattern in [CardDatabase.gd:3056-3076](cards/data/CardDatabase.gd#L3056-L3076):\n\n- **`korrath_core`** — Hero Core (deck-builder pool, branch-neutral). Designed in `KORRATH_HERO_DESIGN § 10`. Distinct from `korrath_common` per `CARD_POOL_ARCHITECTORE.md`.\n- **`korrath_common`** — Hero Common Support (rewards-side, branch-agnostic): generic Armour appliers, Human/Demon utility, Korrath-flavored runes/spells. ~5–7 cards.\n- **`korrath_iron_vanguard`** — Branch 1 talent pool (gated behind `iron_formation` T0): extra Humans, Armour generators, Formation enablers. ~5 cards.\n- **`korrath_runic_knight`** — Branch 2 talent pool (gated behind `runeforge_strike` T0): rune generators that don't depend on the knight attacking, rune-aura amplifiers, hybrid Human/Demon bodies. ~5 cards.\n- **`korrath_abyssal_breaker`** — Branch 3 talent pool (gated behind `corrupting_presence` T0): corruption applicators, AB sources, demon spell-burst, on-death damage scalers. ~5 cards.\n\nAlso decide on `hero_reward_pool` (boss-drop unlock pool) — Vael has 6, Seris is empty. Korrath currently empty too; pick one model and stick to it.\n\nPre-work: extend [`design/KORRATH_HERO_DESIGN`](design/KORRATH_HERO_DESIGN) with §10 (Hero Core — `korrath_core`, **done**) and §11–14 (Common + three branch pools, **pending**) listing each card's role, cost, race tags, and which branch it serves. Settle the design before implementing in `CardDatabase.gd`. Pool wiring into rewards/shop is a separate task (see 009).\n\n## Work log\n\n- 2026-05-08: opened.\n- 2026-05-12: closed.\n\n## Summary\n\nDesigned all five Korrath card pools in `design/KORRATH_HERO_DESIGN` §10–14: `korrath_core` (5 deck-builder cards + 3 tokens), `korrath_common` (9 cards), `korrath_iron_vanguard` (5 cards + 1 token), `korrath_runic_knight` (5 cards, including Runic Blast dual-pooled with `vael_rune_master`), and `korrath_abyssal_breaker` (7 cards, including Font of the Depths triple-pooled with `vael_piercing_void` and `seris_corruption_engine`, plus a new corruption-spawn token). Final inventory: 31 unique cards (29 new + 2 cross-pool reuses) and 5 tokens. Along the way, the design pass also revised B2 T1 `runic_absorption` to be a general rune-destruction listener (no longer overflow-only), formalized the AB-on-attack post-damage timing convention across `path_of_shattering`/Banner/Bonebreaker (which led to follow-up task 021 splitting `ON_PLAYER_ATTACK` into PRE/POST phases), and decided `hero_reward_pool` stays empty (matches Seris precedent).\n\nFollow-ups: implementation of all designed cards in `CardDatabase.gd` is **not** part of this task — task 008 covered design only. Implementation will require: new EffectSteps (CONSUME_HERO_AB for Decree of Ruin, PLACE_RANDOM_RUNE for several B2 cards, summon-with-stat-override for Runic Apparition), engine support for negative Armour (Shattering Volley / Bonebreaker can drive Armour below zero), and the rider-vs-aura distinction codified in §11 ruling notes (Banner of the Order's per-Demon rider). Each branch pool will likely need its own implementation task. Balance sim flagged power-level concerns on: Vanguard Marshal (per-Formation card draw), Shield Bash (scales with total friendly Armour), Oath of Iron (board fill + Formation cascade), Decree of Ruin (700 + consumed AB at 5+ corruption stacks → 1500+ damage hero burst), Maw of the Abyss (6E hybrid Demon nuke), and Rune Conclave / Runic Apparition / Tide of Corruption."}, {"id": "\"009\"", "title": "Korrath rewards and shop pool wiring", "status": "backlog", "area": "meta", "priority": "normal", "started": "", "finished": "", "file": "009-korrath-rewards-shop-wiring.md", "body": "## Description\n\nEven once Korrath card pools exist (task 008), they will silently no-op without explicit wiring in two places. Vael and Seris each have these branches; Korrath has none.\n\n- **[RewardScene.gd:91-105](rewards/RewardScene.gd#L91-L105)** — `_add_branch_pool()` needs three Korrath branches added (`infernal_bulwark`, `runic_knight`, `abyssal_breaker`) appending the matching pool ids.\n- **[ShopScene.gd:443-456](shop/ShopScene.gd#L443-L456)** AND **[ShopScene.gd:482-495](shop/ShopScene.gd#L482-L495)** — both spots need the same three branches added to `branch_pool_names` / `talent_pools`.\n- **`_card_act_gates`** in [CardDatabase.gd:3149](cards/data/CardDatabase.gd#L3149) — every new Korrath card from task 008 needs an act gate (1/2/3) to appear in rewards/shop.\n\nTrivial diff — three or four one-liners — but easy to miss and fully invisible in tests. Verify by running a Korrath run and checking that branch-specific cards appear in card-reward picks and the shop after committing to a branch.\n\n## Work log\n\n- 2026-05-08: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"010\"", "title": "Korrath art pass — portraits, passive/talent icons, card art", "status": "backlog", "area": "art", "priority": "normal", "started": "", "finished": "", "file": "010-korrath-art-pass.md", "body": "## Description\n\nEvery art slot for Korrath is currently empty. The hero is fully playable but visually blank. Generate, process, and wire art for:\n\n- **Hero select portrait** — [HeroDatabase.gd:147](heroes/HeroDatabase.gd#L147) `portrait_path = \"\"`. Place under `assets/art/hero_selection/hero_portrait/`.\n- **Combat portrait** — same line, `combat_portrait_path = \"\"`. Place under `assets/art/heroes/combat_portraits/`.\n- **Hero passive icons (2)** — `abyssal_commander`, `iron_legion` at [HeroDatabase.gd:154,159](heroes/HeroDatabase.gd#L154). Create `assets/art/passives/korrath/` to mirror the Vael folder.\n- **Talent icons (13)** — every `_make()` call in [TalentDatabase.gd:296-376](talents/TalentDatabase.gd#L296-L376) ends with `\"\"`. Create `assets/art/talents/korrath/` mirroring the Vael / Seris folders. (Branch 2 T3 `grand_ritual_chaos` is deferred per task 005, so 12 icons + 1 placeholder, or skip the capstone until that task ships.)\n- **Abyssal Knight card art + battlefield art** — [CardDatabase.gd:406](cards/data/CardDatabase.gd#L406) `art_path = \"\"`. Use `/add-art` skill to wire once the PNGs land.\n\nUse the existing `/add-champion-art` and `/add-art` skills for processing where applicable.\n\n## Work log\n\n- 2026-05-08: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"011\"", "title": "Korrath mechanic gaps — Branch 2 capstone, talent prereqs, polish VFX", "status": "backlog", "area": "combat", "priority": "normal", "started": "", "finished": "", "file": "011-korrath-mechanic-gaps.md", "body": "## Description\n\nThree mechanic-level gaps left over from the Korrath build-out. Hero Armour/AB is tracked separately as task 007.\n\n- **Branch 2 T3 `grand_ritual_chaos` deferred** — needs the RitualVariance system (3 volatile effects with one randomly enhanced post-resolution). Documented in [TalentDatabase.gd:286-287,353-354](talents/TalentDatabase.gd#L286-L287). Branch 2 currently sub-power vs Branches 1 and 3 because of this missing capstone.\n- **`TalentData.requires` schema accepts only one prereq** — Branch 3 T3 `armour_explosion` requires `abyssal_strike` (T1) instead of either of its T2 siblings (`path_of_ruination` / `path_of_destruction`) because the field is a single string. Acknowledged with a code comment in [TalentDatabase.gd:316-325](talents/TalentDatabase.gd#L316-L325). A player could theoretically skip T2 and grab T3 with 4 picks. Refactor `requires` to `Array[String]` (or \"any of these\") and update the talent-tree validation. Korrath is the second hero hitting this — same shape on Runic Knight T3.\n- **Korrath-specific VFX** — Branch 3 capstone \"Armour Explosion\" is currently a silent damage tick across the enemy board; it deserves a visual. Branch 1 \"Iron Resolve\" could use a chevron-style ATK-from-Armour pulse. Branch 2 rune-on-attack is also flat. Use `/create-vfx` skill and the VfxSequence DSL.\n\n## Work log\n\n- 2026-05-08: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"012\"", "title": "Korrath balance pass and branch-aware AI profiles", "status": "backlog", "area": "balance", "priority": "normal", "started": "", "finished": "", "file": "012-korrath-balance-and-ai.md", "body": "## Description\n\nTwo related follow-ups gated on Korrath being content-complete (tasks 008 and 010 don't need to ship first, but balance signal is noisier without the support pools).\n\n- **Run a formal balance pass** via `BalanceSimBatch.tscn` across the Act 1 / Act 2 encounter matrix with the `korrath` profile and each starter deck × each talent set. Identify outlier branches/talents. Particular concerns: T2 sibling balance in Branches 2 and 3 (Path of Demons vs Humans, Path of Ruination vs Destruction), and T3 capstone power across all three branches. Tune numbers based on win-rate gaps.\n- **Branch-aware player profiles** — `KorrathPlayerProfile` is intentionally branch-agnostic ([profile docstring](enemies/ai/profiles/KorrathPlayerProfile.gd)). It plays the knight first regardless of branch, which under-pilots Branch 1 (Bulwark wants to pair the knight with a Human first to maximise Formation HP/Armour). Once balance sim flags a branch as under-performing the baseline, split into subclasses à la `FleshcraftPlayerProfile`: `KorrathBulwarkProfile`, `KorrathBreakerProfile`, `KorrathRunicProfile`. Each registers under a distinct id in `CombatSim._PLAYER_PROFILES`.\n\nRe-run the balance matrix after profile splits to confirm the numbers reflect the hero's actual ceiling, not a weak bot.\n\n## Work log\n\n- 2026-05-08: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"013\"", "title": "Remove dead hero_reward_pool field from HeroData", "status": "done", "area": "meta", "priority": "normal", "started": "2026-05-09", "finished": "2026-05-12", "file": "013-remove-dead-hero-reward-pool-field.md", "body": "## Description\n\n`HeroData.hero_reward_pool` ([HeroData.gd:43](heroes/HeroData.gd#L43)) is a stale field — `RewardScene._get_active_support_pool_ids()` ([RewardScene.gd:86-106](rewards/RewardScene.gd#L86-L106)) hardcodes pool-name lookups (`vael_common`, `seris_common`, talent-gated unlocks) and never reads it. Vael still carries a 6-card list that mirrors `vael_common` exactly; Seris and Korrath are empty. Decide between two cleanups and apply one:\n\n1. **Delete the field** — strip `hero_reward_pool` from `HeroData.gd`, drop the assignments in `HeroDatabase.gd`, fix the stale docstring on line 42.\n2. **Wire it up** — make `RewardScene._get_active_support_pool_ids()` consult `hero.hero_reward_pool` instead of hardcoding pool names per hero. Then populate Seris/Korrath lists and remove the per-hero `if`/`elif` branches.\n\nRecommendation: option 1. The pool-name pipeline is already the source of truth and works for talent-gated unlocks (which the field can't express). If we ever want a per-hero override, re-add it then.\n\nOut of scope: any change to actual pool contents or to talent-gated unlock logic — this is a pure dead-code/refactor pass.\n\n## Work log\n\n- 2026-05-09: opened.\n- 2026-05-12: closed.\n\n## Summary\n\nTook option 1 (delete the field). Removed `hero_reward_pool` declaration + docstring from `HeroData.gd`, dropped the three assignments in `HeroDatabase.gd` (Vael's 6-card mirror of `vael_common`, Seris's empty list, Korrath's empty list), and pruned the stale field doc line from `design/master_doc/DESIGN_DOCUMENT.md`. `RewardScene._get_active_support_pool_ids()` remains the single source of truth via hardcoded pool-name lookups. Full test suite passes (678/681; the 3 remaining failures are pre-existing `KNOWN BUG` entries unrelated to this change)."}, {"id": "\"014\"", "title": "Add VOID_CORRUPTION damage school", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-09", "finished": "2026-05-11", "file": "014-add-void-corruption-damage-school.md", "body": "## Description\n\nAdd `VOID_CORRUPTION` as a sibling sub-school of `VOID` (parallel to existing `VOID_BOLT`) so corruption-themed damage can be amplified independently of generic Void damage. The motivating use case is restricting Seris Branch 3's `void_amplification` (T2) — currently \"+50 spell damage per Corruption stack across all friendly Demons\" applies to every spell school the player casts. After this change, only `VOID_CORRUPTION`-tagged spells benefit. Korrath Branch 3's `path_of_ruination` (T2) — \"+100 spell damage per Corruption stack on the target\" — has the same all-schools problem and inherits the same fix.\n\n**Lineage:**\n\n```\nVOID (parent)\n├── VOID_BOLT       — existing\n└── VOID_CORRUPTION — new\n```\n\n`VOID_CORRUPTION` lineage entry: `[VOID_CORRUPTION, VOID]`. Existing `VOID_BOLT` damage does NOT auto-inherit `VOID_CORRUPTION` amps; future \"+X to VOID damage\" effects buff both siblings via `has_school()`.\n\n**Scope:**\n\n1. Add `Enums.DamageSchool.VOID_CORRUPTION` and its `SCHOOL_LINEAGE` entry ([shared/scripts/Enums.gd:171-188](shared/scripts/Enums.gd#L171)).\n2. Update [`design/DAMAGE_TYPE_SYSTEM.md`](design/DAMAGE_TYPE_SYSTEM.md) — enum table, lineage example, \"VOID-tagged today\" inventory.\n3. Retag corruption-themed spells from `VOID` to `VOID_CORRUPTION` in [`cards/data/CardDatabase.gd`](cards/data/CardDatabase.gd). Confirmed candidate: `abyssal_plague` (currently `VOID`). Audit: `flesh_rend`, `self_mutilation`, `resonant_outburst`, `recursive_hex`, `corruption_weaver`-related damage outputs, `font_of_the_depths`. Generic Void burst (`abyssal_plague` aside, also `void_execution`, `rift_collapse`, `void_lance`, `void_shatter`, `abyssal_summoning_circle` death effect, `_abyss_ritual_circle_passive`) stays `VOID`.\n4. Update Seris `void_amplification` ([talents/TalentDatabase.gd:275-278](talents/TalentDatabase.gd#L275) + handler) so the +50/stack spell-damage amp checks `has_school(VOID_CORRUPTION, info.school)` instead of matching all spell schools. Update talent description text.\n5. Same fix on Korrath `path_of_ruination` ([talents/TalentDatabase.gd:337-340](talents/TalentDatabase.gd#L337) + handler).\n6. Sim parity — mirror any new handler logic into [`sim/SimTriggerSetup.gd`](sim/SimTriggerSetup.gd) if relevant.\n7. Test coverage — extend [`debug/tests/DamageTypeTests.gd`](debug/tests/DamageTypeTests.gd) with: corruption-flavored spell amplified, generic VOID spell NOT amplified, VOID_BOLT NOT amplified, future-style \"+VOID damage\" hypothetical buffs both siblings.\n\n**Out of scope:** UI surfacing of the school on cards (separate UI pass), and any rebalancing of corruption spell numbers — pure plumbing-and-tagging task.\n\n## Work log\n\n- 2026-05-09: opened.\n- 2026-05-11: closed.\n\n## Summary\n\nAdded `Enums.DamageSchool.VOID_CORRUPTION` as a sibling of `VOID_BOLT` under the `VOID` parent in `SCHOOL_LINEAGE`. Retagged four corruption-themed spells (`abyssal_plague`, `flesh_rend`, `flesh_eruption`, `resonant_outburst`) from VOID/NONE → VOID_CORRUPTION. Gated Seris's `void_amplification` amp (`CombatState._spell_dmg` and `cast_player_hero_spell`) and Korrath's `path_of_corruption` amp (`EffectResolver._path_of_corruption_amplify`) on `has_school(school, VOID_CORRUPTION)` so generic VOID and sibling VOID_BOLT damage no longer benefit. Talent descriptions updated to call out \"VOID CORRUPTION\" explicitly. Added lineage tests and end-to-end school-gate tests for both talents (including a \"Void Bolt is no longer amplified but still applies corruption\" test reflecting the deliberate scope reduction). Full suite: 655 passed, 3 failed (all pre-existing KNOWN BUGs unrelated to this change).\n\nFollow-ups: tasks 018 (require school on every damaging spell + add ARCANE + lint) and 019 (gate armour math by school instead of source) are queued as backlog — both build on this taxonomy."}, {"id": "\"014\"", "title": "PR1 — HeroState extraction + BuffSystem hero support + hero armour math", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-09", "finished": "2026-05-09", "file": "014-pr1-hero-state-extraction.md", "body": "## Description\n\nFirst of two PRs implementing task 007 (hero Armour and Armour Break). Pure refactor with no externally visible behavior change for non-Korrath play. Extracts a small `HeroState` (RefCounted) holding `hp`, `hp_max`, `armour`, `buffs`; routes the existing `player_hp` / `enemy_hp` / `player_hp_max` / `enemy_hp_max` properties through it so the `hp_changed` signal contract is preserved. Loosens `BuffSystem` so it accepts either a `MinionInstance` or a `HeroState` (duck-typed on `buffs`). Extracts the Armour / Armour Break / corruption-strip math from `_deal_damage` into a shared helper and calls it from `apply_hero_damage` for `DamageSource.MINION` damage. PR2 (separate) wires the three Korrath handlers, ships the UI badges, and adds tests.\n\n## Work log\n\n- 2026-05-09: opened.\n- 2026-05-09: closed.\n\n## Summary\n\nAdded `combat/board/HeroState.gd` (RefCounted: side, hp, hp_max, armour, buffs) and routed `CombatState.player_hp` / `enemy_hp` / `player_hp_max` / `enemy_hp_max` through `player_hero` / `enemy_hero` containers, preserving the `hp_changed` signal contract. Loosened `BuffSystem` parameters from `MinionInstance` to `Object` (duck-typed on `buffs`); minion-shaped reads (`effective_atk`, `card_data.health`, `shield_cap`, `current_shield`) gated behind `is MinionInstance` checks. Extracted shared `_apply_armour_math(target, damage, corrupt_strip)` from `_deal_damage` and called it from `apply_hero_damage` for `DamageSource.MINION`, mutating `info.amount` to the post-armour value before the signal fires. Added `player_hero` / `enemy_hero` forwarders on `CombatScene`. Verified zero behavior change: RunAllTests 617 pass / 3 pre-existing KNOWN BUGs failing; BalanceSimBatch act 1 swarm slice produced expected win-rate ranges.\n\nFollow-ups: PR2 (task 007 phases 4-6) — wire commanders_reach / path_of_destruction handlers to apply AB to hero targets, ship Armour and AB badges on PlayerHeroPanel / EnemyHeroPanel, add unit tests covering hero-armour math."}, {"id": "\"015\"", "title": "PR2 — hero AB handlers + Armour/AB badges + tests", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-09", "finished": "2026-05-09", "file": "015-pr2-hero-ab-handlers-badges-tests.md", "body": "## Description\n\nSecond of two PRs implementing task 007 (hero Armour and Armour Break). Builds on PR1 (task 014) which already extracted HeroState, loosened BuffSystem to accept hero targets, and added the shared armour-math helper. This PR removes the early-returns in commanders_reach and path_of_destruction so they apply Armour Break to enemy hero targets, adds Armour and Armour Break badges to PlayerHeroPanel and EnemyHeroPanel (icons already in assets/art/icons), wires hero-armour-changed and hero-buff-changed signals on CombatState so the badges update live, and adds unit tests covering hero AB application + the hero side of the shared armour math (reduction, AB-strip, 100-floor, AB-overflow-as-bonus, spell-bypass).\n\n## Work log\n\n- 2026-05-09: opened.\n- 2026-05-09: closed.\n\n## Summary\n\nWired commanders_reach (100 AB) and path_of_destruction (50 AB) to apply Armour Break to the enemy hero on attack, replacing their early-returns with hero-target branches that route through new `CombatState.apply_hero_buff(side, type, amount, source)` and `CombatState.add_hero_armour(side, amount)` wrappers. Added `hero_armour_changed(side, value)` and `hero_buff_changed(side)` signals on CombatState; CombatScene forwards them into a new `CombatUI._refresh_hero_korrath_badges()` subscriber that reads HeroState + BuffSystem totals and pushes them to a new `update_korrath_debuffs(armour, armour_break)` method on PlayerHeroPanel and EnemyHeroPanel — both panels now show hidden-when-zero Armour and Armour Break badge rows mirroring the void-mark pattern. Added 8 unit tests in TriggerHandlerTests covering hero AB application from both handlers, hero armour reduction of MINION-source damage, spell bypass, AB overflow → bonus damage, the 100-damage floor, and signal emission for both new wrappers. RunAllTests: 630 pass / 3 pre-existing KNOWN BUGs failing (no new regressions, +13 over PR1 baseline). Balance-sim act 1 slice ran clean.\n\nFollow-ups: abyssal_strike's hero-target gap (corruption-on-hero, [CombatHandlers.gd:344](combat/events/CombatHandlers.gd#L344)) remains open per the audit — it's a corruption issue, not armour, and is its own task."}, {"id": "\"016\"", "title": "PR3 — hero corruption + corrupting_presence one-shot AB rewrite + UI badges", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-09", "finished": "2026-05-09", "file": "016-pr3-hero-corruption-corrupting-presence-rewrite.md", "body": "## Description\n\nCloses the audit-flagged hero-corruption gap and rewrites corrupting_presence to a one-shot model. Today abyssal_strike, path_of_ruination's spell half, and corrupting_presence all early-return on hero targets, and corrupting_presence's armour-strip is a live read at damage time (cleansing corruption silently restores armour). Under the new model, corrupting_presence emits a permanent +100 ARMOUR_BREAK stack at the moment a corruption stack is applied to an **enemy** target (any source while the talent is active — abyssal_strike, path_of_ruination, future); cleansing the corruption later does not unwind the AB. Damage math returns to the simple two-bucket form (armour vs AB), dropping the corrupt_strip parameter from `_apply_armour_math`. Hero corruption logic lands: abyssal_strike applies corruption to the enemy hero, path_of_ruination amplifies hero-targeting spell damage by 100×stacks and applies a stack post-hit (DAMAGE_HERO + the DAMAGE_MINION enemy_hero string branch + VOID_BOLT all hook in), and `state._corrupt_hero(side)` parallels `_corrupt_minion`. UI: replace the separate Armour and Armour Break badges on PlayerHeroPanel + EnemyHeroPanel with a single icon driven by signed net = `armour - sum(AB)` — positive → green Armour icon, negative → red Armour Break icon, zero hides. Add a Corrupt ×N row alongside (separate stat). Mirror the merged display on BoardSlot's minion status bar.\n\n## Work log\n\n- 2026-05-09: opened.\n- 2026-05-09: closed.\n\n## Summary\n\nRewrote corrupting_presence from a live damage-time armour-strip to a one-shot AB emission: when a Corruption stack is applied to an enemy target (via `_corrupt_minion` or new `_corrupt_hero`) while the talent is active, BuffSystem also drops a permanent +100 ARMOUR_BREAK stack tagged `\"corrupting_presence\"`; cleansing the corruption later does not unwind the AB (separate debuffs after creation). Damage math returned to the simple two-bucket form — `_apply_armour_math` lost its `corrupt_strip` parameter and the corruption-read branch in `_deal_damage` is gone. Hero-corruption logic landed end-to-end: `state._corrupt_hero(side)` parallels `_corrupt_minion`; abyssal_strike now corrupts the enemy hero on attack; path_of_ruination amplifies DAMAGE_HERO / DAMAGE_MINION enemy_hero / VOID_BOLT spell paths by 100×stacks on the enemy hero and applies a stack post-hit. UI consolidation: PlayerHeroPanel / EnemyHeroPanel / BoardSlot status bar now show a single net-armour icon (positive → green Armour, negative → red Armour Break, zero hides) plus a separate `Corrupt ×N` badge row. CombatScene + SimState corruption_removed listeners loosened to `Object` and skip non-minion targets (heroes refresh via hero_buff_changed). 14 new tests + 2 rewritten minion tests; RunAllTests 644 pass / 3 pre-existing KNOWN BUGs failing. Balance-sim act 1 slice clean (no Korrath presets in act 1 today, so no Branch 3 win-rate delta to read).\n\nFollow-ups: hero-corruption VFX (panel flash on apply / on cleanse) is intentionally not in this PR — ship as polish later. Cleanse / dispel still strip both CORRUPTION and ARMOUR_BREAK as DEBUFF_TYPES; if a future card needs to scrub corruption only, add a targeted `BuffSystem.remove_type(target, CORRUPTION)` call rather than a generic cleanse. When Korrath presets ship in BalanceSimBatch, run a full matrix to baseline the Branch 3 win-rate change."}, {"id": "\"017\"", "title": "Talent tree sibling-tier layout", "status": "done", "area": "ui", "priority": "normal", "started": "2026-05-11", "finished": "2026-05-11", "file": "017-talent-tree-sibling-tier-layout.md", "body": "## Description\n\nKorrath branches 2 and 3 have sibling T2 talents (Path of Demons / Path of Humans, Path of Corruption / Path of Shattering) that are mutually exclusive picks, but the talent select screen currently renders them as a flat vertical list of 5 buttons, giving no visual indication that the player should choose 1 of 2. Restructure each branch column into tier rows so single-talent tiers center one button and sibling tiers show two side-by-side, forming a proper tree shape.\n\n## Work log\n\n- 2026-05-11: opened.\n- 2026-05-11: closed.\n\n## Summary\n\nRefactored `TalentSelectScene._make_branch_column` to group talents by tier and render each tier as its own row. Single-talent tiers keep the original wide button; sibling tiers (Korrath B2/B3 T2) show a \"— CHOOSE ONE —\" label above two narrower 224-wide buttons side-by-side, communicating the mutually-exclusive pick visually and turning the column into a proper tree shape. Lord Vael and Seris columns are unchanged since every tier has exactly one talent."}, {"id": "\"018\"", "title": "Require school on spell damage; add ARCANE; lint-enforce", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-11", "finished": "2026-05-11", "file": "018-require-spell-damage-school-add-arcane.md", "body": "## Description\n\nMake `damage_school` a required field on every damage step emitted by a spell card (`SpellCardData`). Today, `NONE` is the implicit default — per CLAUDE.md, \"Default `NONE` is correct for generic spells and minion-emitted effects.\" The user wants to flip that for **spells specifically**: every damaging spell must declare a flavor (PHYSICAL, ARCANE, VOID, VOID_BOLT, VOID_CORRUPTION, …). Minions can keep `NONE` as the default for basic attacks and minion-emitted effects.\n\nThis task is a prerequisite for task 019 (armour math gates by school) — otherwise NONE-school spells under the new armour rule have undefined behavior.\n\n**Scope:**\n\n1. Add `Enums.DamageSchool.ARCANE` and its `SCHOOL_LINEAGE` entry (`[ARCANE]`, no parent). Reserve numerically next to existing schools in [shared/scripts/Enums.gd:171](shared/scripts/Enums.gd#L171).\n2. Update [`design/DAMAGE_TYPE_SYSTEM.md`](design/DAMAGE_TYPE_SYSTEM.md): enum table, lineage example, and the \"Default school\" section — flip the spell rule from \"default NONE\" to \"must declare; load-time validation enforces.\"\n3. Audit every `SpellCardData` in [`cards/data/CardDatabase.gd`](cards/data/CardDatabase.gd) that has a damage-dealing `effect_steps` entry (DAMAGE_MINION / DAMAGE_HERO / DAMAGE_ANY) — currently ~30 spells. Assign a school to each. Suggested mapping:\n   - Abyss faction default → `VOID` (already mostly tagged).\n   - Corruption-themed Abyss spells → `VOID_CORRUPTION` (after task 014 lands).\n   - Neutral spells (`arcane_strike`, `purge`, `cyclone`, `precision_strike`, `hurricane`, `flux_siphon`, etc.) → `ARCANE` or `PHYSICAL` based on flavor.\n   - New Korrath spell `shatterstrike` → `PHYSICAL`.\n4. Add load-time validation: extend `CardDatabase`'s post-load pass to assert that every `SpellCardData` with a DAMAGE_* step has a non-NONE `damage_school`. Fail fast with a clear error pointing at the offending card. This is the \"rule sticky long-term\" enforcement — without it, the convention will rot.\n5. Update [`design/master_doc/CARD_DESCRIPTION_STYLE.md`](design/master_doc/CARD_DESCRIPTION_STYLE.md) if it needs to reflect school being on every spell.\n6. Update CLAUDE.md's \"Default `NONE` is correct\" note to reflect that the rule now only applies to minion-emitted effects, not spells.\n\n**Out of scope:**\n- Armour math changes (that's task 019).\n- Minion audit — `NONE` remains valid for minion attacks and minion-emitted effects.\n- UI surfacing of school on the card visual (separate UI pass).\n\n## Work log\n\n- 2026-05-11: opened.\n- 2026-05-11: closed.\n\n## Summary\n\nAdded `DamageSchool.ARCANE` (and its `SCHOOL_LINEAGE` entry) and flipped the spell convention from \"NONE default\" to \"school required, lint-enforced.\" The 5 previously-untagged spells got schools (`arcane_strike`→ARCANE, `precision_strike`→PHYSICAL, `runic_blast`/`void_screech`/`sovereigns_decree`→VOID); `CardDatabase._validate_spell_damage_schools()` runs after registration and asserts on any `SpellCardData` DAMAGE_* step still on NONE, fail-fast at load. Updated [`design/DAMAGE_TYPE_SYSTEM.md`](design/DAMAGE_TYPE_SYSTEM.md), [`CLAUDE.md`](CLAUDE.md), and the Phase 7 damage-type probe (`arcane_strike` now asserts ARCANE instead of NONE). 661 tests pass; the 3 remaining failures are pre-existing KNOWN BUGs unrelated to this task. Minion-emitted effects, traps, rituals, and environments keep `NONE` as the default — only spells are gated.\n\nFollow-ups: task 019 (armour math gates by school) can now safely assume every spell declares a non-NONE school."}, {"id": "\"019\"", "title": "Gate armour math by damage school, not by source", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-11", "finished": "2026-05-11", "file": "019-armour-math-gate-by-school.md", "body": "## Description\n\nToday, `CombatManager._apply_armour_math` runs only when `DamageSource == MINION` ([combat/board/CombatManager.gd:206-213](combat/board/CombatManager.gd#L206-L213)). Spells (`DamageSource.SPELL`) bypass armour entirely — by design, per the comment on line 226-227. This means a \"physical spell\" like the proposed `shatterstrike` (§10 of design/KORRATH_HERO_DESIGN) cannot be expressed: as a spell, it would bypass armour despite its design intent.\n\nSwitch the gate to **damage school**. New rule:\n\n| School | Armour interaction |\n|---|---|\n| PHYSICAL, ARCANE | Reduced by armour; armour break amplifies; min-100 floor |\n| VOID, VOID_BOLT, VOID_CORRUPTION | Bypass armour entirely |\n| TRUE_DMG | Bypass armour entirely (existing semantic) |\n| NONE | Reduced by armour (only valid for minion sources after task 018) |\n\nThe source distinction (MINION vs SPELL) becomes irrelevant for the armour decision — what matters is the school's flavor. Minion attacks default to `NONE` and still respect armour (current behavior preserved). Spell damage must declare a school per task 018 and the school determines bypass.\n\n**Depends on task 018 landing first** — otherwise `NONE`-school spells would have undefined behavior under the new rule.\n\n**Scope:**\n\n1. Refactor `CombatManager._deal_damage` and `apply_hero_damage` ([combat/board/CombatManager.gd:179-233](combat/board/CombatManager.gd#L179)) to gate `_apply_armour_math` by school via `Enums.has_school()` — bypass set is `{VOID, TRUE_DMG}` (plus everything in their lineage trees, including `VOID_BOLT` and `VOID_CORRUPTION`).\n2. Verify `_build_damage_info` in [`combat/effects/EffectResolver.gd`](combat/effects/EffectResolver.gd) emits the declared school on spell damage steps so the new gate has real data to read.\n3. **Armour Break implication** — currently AB amplifies damage only when armour math runs (i.e. only on minion attacks). Under the new rule, AB amplifies any non-bypassing damage including PHYSICAL/ARCANE spells. This is a real power increase for Korrath B3 Path of Destruction + spell builds. Flag this in the balance pass, don't try to special-case it out.\n4. Update [`design/master_doc/DESIGN_DOCUMENT.md`](design/master_doc/DESIGN_DOCUMENT.md) and [`design/KORRATH_HERO_DESIGN`](design/KORRATH_HERO_DESIGN) §6: \"Spells vs Armour | Spells bypass Armour entirely\" → \"Spells vs Armour | Depends on school: PHYSICAL/ARCANE reduce, VOID/TRUE bypass.\"\n5. Update [`design/DAMAGE_TYPE_SYSTEM.md`](design/DAMAGE_TYPE_SYSTEM.md) — the source-vs-school discussion needs a new section.\n6. Re-run `res://debug/BalanceSimBatch.tscn` Act 1 + Act 2 matrix; record before/after win-rate deltas for Vael / Seris / Korrath. Armour gains real value across the board; some spell-heavy builds get harder counters.\n7. Test coverage in [`debug/tests/DamageTypeTests.gd`](debug/tests/DamageTypeTests.gd):\n   - PHYSICAL spell vs armoured minion → reduced by armour, floor 100\n   - ARCANE spell vs armoured minion → reduced by armour, floor 100\n   - VOID spell vs armoured minion → full damage, no floor\n   - VOID_CORRUPTION spell vs armoured minion → full damage, no floor\n   - PHYSICAL spell vs target with stacked AB → AB amplifies damage above raw\n   - Hero variant of each above where hero is target.\n8. Update §10 of design/KORRATH_HERO_DESIGN — Shatterstrike's \"reduced by Armour, min 100; interacts with Armour Break\" parenthetical becomes the literal truth instead of aspirational text. No edit needed if the wording already matches post-fix behavior.\n\n**Out of scope:**\n- Adding new schools beyond what task 018 introduces.\n- Minion-emitted effect changes — they remain MINION source, NONE-school default, respect armour. No regression.\n- Rebalancing existing card numbers — balance fallout audit happens here, but rebalancing is a separate task per card if needed.\n\n## Work log\n\n- 2026-05-11: opened.\n- 2026-05-11: shipped the armour-gate refactor — `CombatManager._school_bypasses_armour(school)` returns true for VOID lineage + TRUE_DMG; both `_deal_damage` and `apply_hero_damage` now route through it instead of checking `source == MINION`. `_build_damage_info` already plumbs `step.damage_school` end-to-end (no change needed). Added six Phase-9 probes in `DamageTypeTests.gd`: PHYSICAL spell reduced by armour, ARCANE spell reduced by armour, VOID_CORRUPTION spell bypasses (sub-school lineage), AB amplifies PHYSICAL spell above raw, and hero variants for PHYSICAL-reduced / VOID-bypass. Updated KORRATH_HERO_DESIGN §2 Armour table, §6 system summary, and dropped the \"Depends on task 019\" caveat from §10 shatterstrike. Added a \"Source vs school for armour\" section to DAMAGE_TYPE_SYSTEM.md. RunAllTests: 669 passed, 3 failed (same pre-existing KNOWN BUGs as task 018). Balance sim deferred per user.\n- 2026-05-11: closed.\n\n## Summary\n\nSwitched the Korrath armour gate from `source == MINION` to a school predicate (`CombatManager._school_bypasses_armour` — VOID lineage + TRUE_DMG bypass; PHYSICAL/ARCANE/NONE reduce). This unblocks PHYSICAL spells like `shatterstrike` interacting with Armour and lets Armour Break amplify non-bypassing spell damage. Six new Phase-9 probes lock the matrix (PHYSICAL/ARCANE reduced, VOID_CORRUPTION bypasses via sub-school lineage, AB amplifies PHYSICAL spells, hero variants); the existing minion path still respects armour because basic attacks default to PHYSICAL in `_attack_damage_info`. KORRATH §2/§6/§10 and DAMAGE_TYPE_SYSTEM.md updated. Full suite 669 pass / 3 fail (same pre-existing KNOWN BUGs as task 018).\n\nFollow-ups: Balance sim deferred — Korrath B3 spell builds get a real power increase from AB amplifying PHYSICAL/ARCANE spell damage; run `BalanceSimBatch` on the next balance pass to size the swing on Vael / Seris / Korrath win-rates."}, {"id": "\"020\"", "title": "Redesign Commander's Reach — +50 Armour to all friendly Humans on any Formation trigger", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-11", "finished": "2026-05-12", "file": "020-redesign-commanders-reach-formation-armour.md", "body": "## Description\n\nReplace Korrath Branch 1 T1 (`commanders_reach`) effect. Old: aura that gave adjacent friendly Humans 100 Armour Break on attack. New: whenever any friendly minion's FORMATION effect triggers, all friendly Human minions on board permanently gain +50 Armour. Aligns the talent with Branch 1's Armour-stacking identity (T0 Formation → T1 board Armour → T2 Armour→ATK → T3 doubling) and removes redundancy with Branch 3's Armour Break role. Requires a new `ON_FORMATION_TRIGGERED` trigger event, handler swap, sim parity, design doc updates, and test rewrite.\n\n## Work log\n\n- 2026-05-11: opened.\n- 2026-05-12: closed.\n\n## Summary\n\nReplaced Commander's Reach with the Formation-listener design: added `ON_FORMATION_TRIGGERED` trigger event (fired from `CombatHandlers._try_fire_formation` whenever any friendly Formation resolves), wired `on_formation_triggered_commanders_reach` in `CombatSetup` to grant +50 Armour to every friendly Human on the board, updated `design/KORRATH_HERO_DESIGN` to the new text, and added four TriggerHandlerTests probes (buff, race filter, stacking, Unbreakable doubling). Sim parity is automatic — `SimTriggerSetup` delegates to `CombatSetup.setup()` and `SimState extends CombatState`, so no duplicate registration was needed; updated `CLAUDE.md`'s \"Adding New Trigger Handlers\" section to reflect this and stop instructing duplicate sim registrations."}, {"id": "\"021\"", "title": "Split ON_PLAYER_ATTACK into PRE/POST phases; move path_of_shattering to POST", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-11", "finished": "2026-05-12", "file": "021-split-on-player-attack-pre-post-phases.md", "body": "## Description\n\nThe `ON_PLAYER_ATTACK` trigger currently fires once, before damage resolves, in `combat/board/CombatManager.gd`. Per the new AB-on-attack timing convention codified in `design/KORRATH_HERO_DESIGN` §11 (Banner of the Order + AB-residual ruling note), Path of Shattering should apply its 50 AB *after* the attack's damage resolves, so AB accumulates on targets across attacks and feeds Shattering Doom rather than being consumed each strike. Split the trigger into `ON_PLAYER_ATTACK_PRE` and `ON_PLAYER_ATTACK_POST` phases, move `path_of_shattering` to POST, leave `corrupting_strike` and `runeforge_strike` on PRE (their existing semantics don't change). Mirror the split to `sim/SimTriggerSetup.gd` for sim parity, update `Enums.gd`, and verify tests still pass.\n\n## Work log\n\n- 2026-05-11: opened.\n- 2026-05-11: implemented. Enums split (`ON_PLAYER_ATTACK` → `ON_PLAYER_ATTACK_PRE` + `ON_PLAYER_ATTACK_POST`), mirror table updated (both player phases mirror to single `ON_ENEMY_ATTACK`). `CombatManager.resolve_minion_attack` and `resolve_minion_attack_hero` now fire PRE before damage and POST after defender's damage but before counter-attack/pierce. Handler reassignment in `CombatSetup`: `corrupting_strike` + `runeforge_strike` stay PRE, `path_of_shattering` moves to POST. Sim parity is automatic — `SimTriggerSetup` delegates to the same `CombatSetup.setup()`. Added new assertion `_path_of_shattering_ab_applied_after_damage` that proves defender keeps its pre-strike armour after the attack (would be stripped if PRE timing). Full suite: 674 passed / 3 pre-existing KNOWN BUG failures unchanged.\n- 2026-05-12: closed.\n\n## Summary\n\nSplit `ON_PLAYER_ATTACK` into `ON_PLAYER_ATTACK_PRE` and `ON_PLAYER_ATTACK_POST` phases so AB-residual handlers can apply armour after damage resolves instead of having it consumed by the same strike. `CombatManager` fires PRE before damage and POST after defender damage (before counter-attack/pierce) in both minion-vs-minion and minion-vs-hero paths; `corrupting_strike` and `runeforge_strike` stay on PRE, `path_of_shattering` moves to POST. Sim parity is automatic via `SimTriggerSetup` → `CombatSetup.setup()`; new assertion proves AB persists on the defender after the attack."}, {"id": "\"022\"", "title": "Korrath Runic Absorption redesign — trigger on any rune destroy/consume", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-11", "finished": "2026-05-12", "file": "022-redesign-runic-absorption-trigger.md", "body": "## Description\n\nRewrite Korrath B2 T1 `runic_absorption` so it fires whenever a friendly rune is destroyed or consumed (ritual fire, Grand Ritual: Chaos, overflow, Runic Substitution, Cyclone-style removal) — not only on full-board overflow. Centralize the absorption hook in `CombatState._remove_rune_aura` so every rune-removal path inherits the behavior, then strip the now-redundant inline absorption blocks in `_korrath_place_random_rune` and `on_rune_placed_grand_ritual_chaos`.\n\n## Work log\n\n- 2026-05-11: opened.\n- 2026-05-12: closed.\n\n## Summary\n\nCentralized Korrath B2 T1 `runic_absorption` in `CombatState._remove_rune_aura`: any player-side rune destruction or consumption now grants an absorbed-aura stack to a random friendly Abyssal Knight via `_korrath_grant_absorbed_aura`. `_korrath_place_random_rune` was simplified to route overflow through `_remove_rune_aura` instead of inlining the grant, and `on_rune_placed_grand_ritual_chaos` consumes the three runes through the same chokepoint with no bespoke absorption logic — so ritual fire, Grand Ritual: Chaos, Runic Substitution, and any future rune-removal path inherit the behavior for free."}, {"id": "\"023\"", "title": "Implement korrath_core cards in CardDatabase", "status": "done", "area": "content", "priority": "normal", "started": "2026-05-16", "finished": "2026-05-16", "file": "023-implement-korrath-core-cards.md", "body": "## Description\n\nImplement the deck-builder cards + tokens designed in `design/KORRATH_HERO_DESIGN` §10 into `cards/data/CardDatabase.gd` and wire the `korrath_core` pool into `_card_pools` + `DeckBuilderScene.DECK_BUILDER_POOLS_BY_HERO`. Cards shipped in this task: `squire_of_the_order` (2E Human/Demon FORMATION Knight-discount), `order_conscript` (1E Human + adds Footman to hand), `quartermaster` (3E Human + per-summon Armour aura), `shatterstrike` (2M physical removal). Tokens shipped: `order_footman` (1E 100/200 Human, hand-only) and the two `rank_and_file` tokens (consumed later by Rally). Supporting infra: add `essence_cost` support to `_TOKEN_DEFS` (Footman is 1E), add a generic `on_friendly_summon_aura_steps` field on `MinionCardData` + a dispatcher handler `on_minion_summoned_friendly_aura` registered in `CombatSetup` so Quartermaster (and future on-summon auras) declare effect steps instead of bespoke handlers. Add probes in `CardEffectTests.gd` for each card's primary effect. **`rally_the_ranks` is split to task 038** because it needs three additional new mechanics (dual-race target_type, adjacent-to-target summon step, dual-tag race-picker UI with sim parity).\n\n## Work log\n\n- 2026-05-12: opened.\n- 2026-05-16: started.\n- 2026-05-16: split rally_the_ranks to task 038 (needs new target_type + adjacent-summon step + dual-tag picker UI).\n- 2026-05-16: closed.\n\n## Summary\n\nShipped 4 of 5 Korrath Core Pool cards (squire_of_the_order, order_conscript, quartermaster, shatterstrike) + 3 tokens (order_footman 1E Human, rank_and_file_h/d 0E race-matched), wired the `korrath_core` pool into `_card_pools` and `DeckBuilderScene.DECK_BUILDER_POOLS_BY_HERO[\"korrath\"]`, and added 7 probes in `CardEffectTests.gd` covering each card's primary effect. 710/710 tests pass. Two reusable infra pieces landed alongside the cards: (1) generic `MinionCardData.on_friendly_summon_aura_steps` field + `CombatHandlers.on_minion_summoned_friendly_aura` dispatcher registered in `CombatSetup` for declarative \"fire on every friendly summon\" auras (Quartermaster is the first consumer, skips self, stacks across multiple sources); (2) declarative `MOD_HAND_CARDS_COST` EffectStep that mutates `essence_delta` / `mana_delta` on every CardInstance in the caster's hand matching AND-combined `card_id` / `card_tag` / `card_race` filters — Squire's \"discount Abyssal Knights in hand by 2\" formation effect uses it and any future \"broadcast cost change\" effect can drop in without new code. Also added `essence_cost` support to `_TOKEN_DEFS` (default 0) so hand-only tokens like Footman can carry real costs.\n\nFollow-ups: task 038 covers Rally the Ranks + its three infra prerequisites (dual-race `target_type`, adjacent-to-target SUMMON step, dual-tag race-picker UI with sim parity). The two rank_and_file tokens are pre-staged for it."}, {"id": "\"024\"", "title": "Implement korrath_common cards in CardDatabase", "status": "backlog", "area": "content", "priority": "normal", "started": "", "finished": "", "file": "024-implement-korrath-common-cards.md", "body": "## Description\n\nImplement the 9 cards designed in `design/KORRATH_HERO_DESIGN` §11 into `cards/data/CardDatabase.gd` and add `korrath_common` to `_card_pools`. Cards: `armoured_recruit`, `shield_bearer` (FORMATION, outward GUARD+Armour), `bonebreaker` (Demon, damage-first-then-AB), `shattering_volley` (AoE AB+PHYSICAL, supports negative Armour), `battle_drillmaster` (FORMATION cascade ignoring adjacency), `rank_breaker` (FORMATION AoE AB), `bastion_rune` (start-of-turn Armour drip), `creeping_blight` (single-target VOID_CORRUPTION + corruption), `banner_of_the_order` (per-minion Human Armour grant + per-Demon AB-on-attack rider). Pool wires into combat-rewards eligibility via existing reward filter — gated to Korrath only, no talent prereq. Add probes in `CardEffectTests.gd` and `TriggerHandlerTests.gd` for each card; especially verify Banner's rider scope (current-Demons-only, idempotent, dies with the minion) and Battle Drillmaster's cascade behavior.\n\nEngine prerequisites that may need to ship alongside or before this task:\n- Negative Armour state support (Shattering Volley / Bonebreaker can drive Armour below zero — verify `MinionInstance.armour` allows negative values and the flat-bonus-damage math from §2 fires correctly).\n- Rider-as-per-minion-flag (Banner of the Order) versus aura (Quartermaster) distinction codified in `MinionInstance`.\n\n## Work log\n\n- 2026-05-12: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"025\"", "title": "Implement korrath_iron_vanguard cards in CardDatabase", "status": "backlog", "area": "content", "priority": "normal", "started": "", "finished": "", "file": "025-implement-korrath-iron-vanguard-cards.md", "body": "## Description\n\nImplement the 5 talent-gated cards + 1 token designed in `design/KORRATH_HERO_DESIGN` §12 into `cards/data/CardDatabase.gd` and add `korrath_iron_vanguard` to `_card_pools` with talent gating on `iron_formation` (B1 T0). Cards: `shield_squire` (1E Human FORMATION self-Armour), `vanguard_marshal` (3E Human, draws a card per Formation event — listens on `ON_FORMATION_TRIGGERED`), `shield_bash` (1M spell, damage = sum of friendly minion + hero Armour), `lord_commander` (5E Human, +200 hero Armour on play), `oath_of_iron` (3M spell, fills empty slots with Iron Footmen and triggers Formation cascade). Token: `iron_footman` (200/200 Human, vanilla; distinct from `order_footman` in core). Reward eligibility must check both pool tag and `iron_formation` in the active talent set. Add probes in `TriggerHandlerTests.gd` for Marshal's per-Formation card draw and Oath's board-fill + Formation-cascade behavior; verify Shield Bash damage scaling against varied friendly Armour states.\n\nEngine prerequisites:\n- Per-talent pool gating in the reward filter (mirrors `vael_piercing_void` precedent).\n- Card-driven `on_attack`-style hook for Marshal if not already in place.\n\n## Work log\n\n- 2026-05-12: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"026\"", "title": "Implement korrath_runic_knight cards in CardDatabase", "status": "backlog", "area": "content", "priority": "normal", "started": "", "finished": "", "file": "026-implement-korrath-runic-knight-cards.md", "body": "## Description\n\nImplement the 5 cards designed in `design/KORRATH_HERO_DESIGN` §13 into `cards/data/CardDatabase.gd` and add `korrath_runic_knight` to `_card_pools` with talent gating on `runeforge_strike` (B2 T0). Cards: `runebound_initiate` (2E dual-tag FORMATION places a random Rune; up to 2× if flanked, per §13 dual-tag-Formation ruling), `runic_substitution` (1M spell, destroy targeted Rune, place random basic Rune, triggers redesigned T1), `runic_blast` (existing `vael_rune_master` card — **dual-pool** only; add `\"korrath_runic_knight\"` to its pool tag in the dict), `runic_apparition` (3M spell, conditional Knight summon with SWIFT and −200/−200 stat override), `rune_conclave` (4E dual-tag minion 200/500, ON PLAY places 2 random Runes). Reward eligibility checks pool tag + `runeforge_strike` in active talents. Depends on task 022 (T1 redesign) being implemented first so Substitution's destruction correctly feeds absorption.\n\nEngine prerequisites:\n- Targeted-Rune spell flow (Substitution needs to let the player pick a friendly Rune — existing spells target minions/heroes, not runes). May require a new target type or UI flow.\n- Runtime stat-override at summon time (Runic Apparition's −200/−200) that composes with talent_overrides on the Knight.\n- Dual-tag Formation behavior matches §13 ruling notes: pair-keyed-on-partner means a flanked dual-tag minion fires Formation twice. May also affect Squire of the Order (`korrath_core`) and Battle Drillmaster cascade (`korrath_common`) — audit those alongside.\n\n## Work log\n\n- 2026-05-12: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"027\"", "title": "Implement korrath_abyssal_breaker cards in CardDatabase", "status": "backlog", "area": "content", "priority": "normal", "started": "", "finished": "", "file": "027-implement-korrath-abyssal-breaker-cards.md", "body": "## Description\n\nImplement the 7 cards + 1 token designed in `design/KORRATH_HERO_DESIGN` §14 into `cards/data/CardDatabase.gd` and add `korrath_abyssal_breaker` to `_card_pools` with talent gating on `corrupting_presence` (B3 T0). Cards: `shatterclaw_fiend` (3E Demon, on-attack 100 AB residual via `ON_PLAYER_ATTACK_POST` per task 021), `font_of_the_depths` (existing card — **triple-pool**; add `\"korrath_abyssal_breaker\"` to its existing `[\"vael_piercing_void\", \"seris_corruption_engine\"]` tag), `decree_of_ruin` (3M spell, consume hero AB and deal 700 + consumed-AB VOID_CORRUPTION to hero), `tide_of_corruption` (3M spell, summon 200/200 Corruption Spawn per corrupted enemy minion), `abyssal_sentence` (4M spell, destroy enemy minion + 1 Corruption to enemy hero), `herald_of_decay` (3E Demon, on-play and turn-start hero corruption +1/turn), `maw_of_the_abyss` (6E Demon, AoE 2 Corruption on play + per-attack AB residual). Token: `corruption_spawn` (200/200 Demon, vanilla). Reward eligibility checks pool tag + `corrupting_presence` in active talents.\n\nEngine prerequisites (new effect-step patterns this task introduces):\n- `CONSUME_HERO_AB` (or generalized `CONSUME_HERO_BUFF`) effect step — reads the hero's AB total, removes all of it, exposes the value for the following damage step.\n- Damage step that reads the consumed-buff value from EffectContext and adds it to base damage. Required for Decree of Ruin's \"700 + consumed AB\" math; Path of Corruption amp applies to the combined total.\n- Hero-corruption support (already exists from task 016 PR3) — Herald's recurring effect and Sentence's rider both route through `state.apply_hero_buff(\"enemy\", BuffType.CORRUPTION, 100, ...)`.\n- Counting helper for Tide: `enemy_minions_with_corruption_count()` reading `BuffSystem.count_type(minion, BuffType.CORRUPTION) >= 1`.\n\nAdd probes in `TriggerHandlerTests.gd` and `CardEffectTests.gd` for every card; especially verify Decree's AB-consumption math (basic case, 0 AB, with Path of Corruption amp, with negative pre-existing AB clamped to 0) and Tide's empty-slot fill behavior.\n\n## Work log\n\n- 2026-05-12: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"028\"", "title": "Art pass — korrath_core", "status": "backlog", "area": "art", "priority": "normal", "started": "", "finished": "", "file": "028-art-pass-korrath-core.md", "body": "## Description\n\nGenerate and wire art for the `korrath_core` pool cards (designed in §10). Five deck-buildable cards need card-face art; three of them are minions and also need battlefield art. Tokens (Order Footman, Rank-and-File ×2) are vanilla but still need card-face art so they render properly when added to hand or summoned.\n\nCards needing art:\n- `squire_of_the_order` — Human/Demon FORMATION minion. Card art + battlefield art.\n- `order_conscript` — Human minion. Card art + battlefield art.\n- `rally_the_ranks` — Spell. Card art only.\n- `quartermaster` — Human minion. Card art + battlefield art.\n- `shatterstrike` — Spell. Card art only.\n\nTokens:\n- `order_footman` — Human, card-face only (hand display).\n- `rank_and_file_h` — Human, card-face only (summon flash).\n- `rank_and_file_d` — Demon, card-face only (summon flash).\n\nWorkflow: use the `missing-art` skill to scan for gaps, then `add-art` to wire each PNG. Art style follows `design/master_doc/CARD_FRAME_DESIGN_REGULATION.md`. Order pool flavor is \"imperial dark knight order\" — disciplined humans-and-demons in armor, Korrath's banner motif.\n\n## Work log\n\n- 2026-05-12: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"029\"", "title": "Art pass — korrath_common", "status": "backlog", "area": "art", "priority": "normal", "started": "", "finished": "", "file": "029-art-pass-korrath-common.md", "body": "## Description\n\nGenerate and wire art for the 9 cards in `korrath_common` (designed in §11). Mix of minions (need card + battlefield art) and spells (card only).\n\nMinions (card + battlefield):\n- `armoured_recruit` — Human, plate-armoured.\n- `shield_bearer` — Human with tower shield, FORMATION-flavored.\n- `bonebreaker` — Demon, brutal armour-cracker.\n- `battle_drillmaster` — Human/Demon dual-tag, commander figure.\n- `rank_breaker` — Demon, fast and savage.\n\nSpells (card only):\n- `shattering_volley` — physical/AB AoE motif.\n- `creeping_blight` — VOID_CORRUPTION single-target, dark green/purple.\n- `banner_of_the_order` — banner-raising, dual-race buff motif.\n\nRune (card only):\n- `bastion_rune` — Armour-themed rune. Should visually distinguish from existing Abyss Order Runes (Void/Blood/Dominion/Shadow) since Bastion is a Korrath-specific addition; consider a shield-engraved glyph in the rune frame.\n\nWorkflow: use `missing-art` to scan for gaps, then `add-art` to wire each PNG. Style follows `CARD_FRAME_DESIGN_REGULATION.md`. Pool flavor is Korrath's broad mechanic kit — Armour, Armour Break, Formation — without leaning into a single branch.\n\n## Work log\n\n- 2026-05-12: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"030\"", "title": "Art pass — korrath_iron_vanguard", "status": "backlog", "area": "art", "priority": "normal", "started": "", "finished": "", "file": "030-art-pass-korrath-iron-vanguard.md", "body": "## Description\n\nGenerate and wire art for the 5 cards + 1 token in `korrath_iron_vanguard` (designed in §12). Iron Vanguard's visual identity is heavy plate armour, disciplined human formations, banners-and-pikes Roman-style legion aesthetic.\n\nMinions (card + battlefield):\n- `shield_squire` — young Human with oversized shield.\n- `vanguard_marshal` — Human commander, scroll/banner motif for the card-draw flavor.\n- `lord_commander` — Human, regal full-plate, projection-of-authority pose. Should feel like a hero-armour-granting figure.\n\nSpells (card only):\n- `shield_bash` — concussive shield-strike motif, scales-with-Armour visual cue.\n- `oath_of_iron` — ritual oath being sworn, Footmen materializing in the background.\n\nToken (card-face only):\n- `iron_footman` — distinct from Order Footman (core pool's token). Iron Footman is 200/200 vs Order Footman's 100/200 — visually depict heavier armour to signal the stat difference.\n\nWorkflow: use `missing-art` then `add-art`. Style per `CARD_FRAME_DESIGN_REGULATION.md`.\n\n## Work log\n\n- 2026-05-12: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"031\"", "title": "Art pass — korrath_runic_knight", "status": "backlog", "area": "art", "priority": "normal", "started": "", "finished": "", "file": "031-art-pass-korrath-runic-knight.md", "body": "## Description\n\nGenerate and wire art for the 4 net-new cards in `korrath_runic_knight` (designed in §13). Runic Knight's visual identity is glowing rune-etched armour and weapons, chaotic-magic energy, dual-tag Human/Demon hybrid silhouettes. `runic_blast` is excluded — it's the existing `vael_rune_master` card (dual-pool only, art already wired).\n\nMinions (card + battlefield):\n- `runebound_initiate` — dual-tag Human/Demon FORMATION minion. Should visually carry both Human and Demon traits (split silhouette, or robed figure with corruption-marks).\n- `rune_conclave` — dual-tag Human/Demon 200/500 Epic body. The pool's centerpiece minion; should feel ritual-conclave / coven-of-runesmiths.\n\nSpells (card only):\n- `runic_substitution` — rune-being-shattered-and-replaced motif. Player-targeting visual.\n- `runic_apparition` — ghost-Knight materializing from runic energy. Should visually echo the Abyssal Knight base art but spectral/translucent to telegraph the −200/−200 stat profile.\n\nWorkflow: use `missing-art` then `add-art`. Style per `CARD_FRAME_DESIGN_REGULATION.md`. Note the dual-tag minions should follow whatever Squire of the Order (`korrath_core`) establishes for dual-tag silhouette convention.\n\n## Work log\n\n- 2026-05-12: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"032\"", "title": "Art pass — korrath_abyssal_breaker", "status": "backlog", "area": "art", "priority": "normal", "started": "", "finished": "", "file": "032-art-pass-korrath-abyssal-breaker.md", "body": "## Description\n\nGenerate and wire art for the 6 net-new cards + 1 token in `korrath_abyssal_breaker` (designed in §14). Abyssal Breaker's visual identity is corruption-saturated demonic horror, sickly green-purple VOID_CORRUPTION palette, body-horror Demon designs. `font_of_the_depths` is excluded — it's the existing card (triple-pool only, art already wired).\n\nMinions (card + battlefield):\n- `shatterclaw_fiend` — Demon with shattering oversized claws, per-attack-AB visual cue.\n- `herald_of_decay` — gaunt Demon herald spreading corruption-plague aura outward.\n- `maw_of_the_abyss` — Epic 6
