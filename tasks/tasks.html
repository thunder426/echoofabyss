E 500/600 Demon body. Pool's marquee card; should feel like a horror finisher.\n\nSpells (card only):\n- `decree_of_ruin` — judgement / ruin motif, VOID_CORRUPTION green-purple energy striking enemy hero. Visually evocative of consumption-conversion (AB consumed → damage).\n- `tide_of_corruption` — wave of corruption-spawn demons rising from corrupted enemies.\n- `abyssal_sentence` — execution/verdict motif on enemy minion + corruption tendril reaching toward enemy hero.\n\nToken (card-face only):\n- `corruption_spawn` — 200/200 Demon spawn, generic but distinctly corruption-flavored (matches Tide of Corruption's summon flash).\n\nWorkflow: use `missing-art` then `add-art`. Style per `CARD_FRAME_DESIGN_REGULATION.md`. Coordinate with `task-009` (already-implemented Korrath Branch 3 talents) — visual continuity with `corrupting_presence` / `corrupting_strike` / `path_of_corruption` talent icons.\n\n## Work log\n\n- 2026-05-12: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"033\"", "title": "Audit description style for all new Korrath cards", "status": "backlog", "area": "content", "priority": "normal", "started": "", "finished": "", "file": "033-audit-korrath-card-descriptions.md", "body": "## Description\n\nAfter implementation tasks 023–027 ship, audit every new Korrath card's in-game description text against `design/master_doc/CARD_DESCRIPTION_STYLE.md`. Scope: all cards from `korrath_core`, `korrath_common`, `korrath_iron_vanguard`, `korrath_runic_knight`, and `korrath_abyssal_breaker` (≈31 cards). Existing cards in those pools that are dual/triple-pooled (Runic Blast, Font of the Depths) are out of scope — their descriptions were written by their original pools.\n\nAudit checklist per card:\n- Description uses the standard keyword casing (FORMATION, GUARD, SWIFT, ON PLAY, ON DEATH, ON LEAVE, ON ATTACK, etc.) per the style guide.\n- Numeric values are bare integers, not spelled out (100, not \"one hundred\").\n- Trigger timing language is consistent (\"ON PLAY:\", \"FORMATION:\", \"Whenever ...\", \"At the start of your turn:\", etc.).\n- Damage school is named where relevant (VOID_CORRUPTION, PHYSICAL) so the player knows which Armour interaction applies.\n- Card text is parseable without referring to the design doc — any non-obvious interaction (Banner's per-minion rider scope, Drillmaster's adjacency bypass, Shield Bash's Armour-sum-not-spent rule, Decree's AB-consumption-then-damage order) is either clear from the text or accompanied by a UI tooltip.\n- Cards that introduce or reference new mechanics (hero Armour, negative Armour, post-damage AB residual, AB consumption, rider-vs-aura) have description language consistent with the §2 / §6 / §11 ruling notes in the design doc.\n\nOutput: a punch list of cards-with-issues + suggested rewrites. Apply the rewrites in the same task.\n\n## Work log\n\n- 2026-05-12: opened.\n\n## Summary\n\n_(filled in at /task-done)_"}, {"id": "\"034\"", "title": "Fix the 3 KNOWN BUG test failures", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-13", "finished": "2026-05-13", "file": "034-fix-known-bug-test-failures.md", "body": "## Description\n\nThree tests in the test suite have been intentionally failing since they were written, each labeled `KNOWN BUG` in-test. Each represents a real symmetric-handling gap in the combat code — a player-side effect that has no enemy-side mirror, or an enemy-passive whose state flag is never set. Resolving them gets the suite to 100% green and closes long-standing parity holes.\n\nThe 3 failures:\n\n1. **`fiendish_pact / enemy cast arms discount on enemy side`** — [debug/tests/CardEffectTests.gd:191](debug/tests/CardEffectTests.gd#L191). `HardcodedEffects._fiendish_pact` early-returns when `ctx.owner != \"player\"`, so an enemy-cast Fiendish Pact arms no discount on the enemy side. **Fix:** add a symmetric enemy-side field (`_enemy_fiendish_pact_pending` or similar) and mirror the discount-on-next-Demon logic for the enemy. Confirm the cost-display hint on Demons in enemy hand updates too.\n\n2. **`void_rift_lord / player cast drains enemy mana next turn`** — [debug/tests/CardEffectTests.gd:455](debug/tests/CardEffectTests.gd#L455). The player-cast path for `void_rift_lord`'s mana-drain effect has no enemy-side flag, so the drain never lands. **Fix:** add a symmetric enemy-side mana-drain flag and the start-of-turn handler that consumes it. Same pattern as the existing player-side drain.\n\n3. **`champion_vch / 3 crit-kills summon champion (flag not set)`** — [debug/tests/TriggerHandlerTests.gd:1676](debug/tests/TriggerHandlerTests.gd#L1676). `_summon_enemy_champion`'s match block in `combat/events/CombatHandlers.gd` (lines ~1634-1660) is missing the `\"champion_void_champion\"` case, so `_champion_vch_summoned` never flips to true after summoning. The Void Champion minion is still placed on the board (the aura works by accident via enemy_board scan), but re-summon guards never engage. **Fix:** add `\"champion_void_champion\": _scene.set(\"_champion_vch_summoned\", true)` to the match (per the in-test fix hint at TriggerHandlerTests.gd:1682).\n\nVerification: after each fix, run `godot --headless --path . res://debug/tests/RunAllTests.tscn` and confirm the relevant test now passes without breaking any other test. Final state should be a fully green suite.\n\n## Work log\n\n- 2026-05-12: opened.\n- 2026-05-13: closed all 3 KNOWN BUG gaps; suite now 681/681 green.\n\n## Summary\n\nClosed the three symmetric-handling gaps that had lived as `KNOWN BUG` probes:\n\n1. **champion_void_champion summon flag** — added the missing `\"champion_void_champion\": _scene.set(\"_champion_vch_summoned\", true)` case to `_summon_enemy_champion`'s match block in [combat/events/CombatHandlers.gd](combat/events/CombatHandlers.gd). One-line fix; re-summon guards now engage correctly.\n\n2. **fiendish_pact enemy-side parity** — added `_enemy_fiendish_pact_pending: int` to [CombatState.gd](combat/board/CombatState.gd), removed the player-only early-return in `HardcodedEffects._fiendish_pact`, and now branch by `ctx.owner` to set the right field. Mirrored the display-only `essence_delta` hint for enemy-hand Demons; player-only `_refresh_hand_spell_costs` stays gated. Cleared at enemy turn start in both [CombatScene.gd](combat/board/CombatScene.gd) and [SimState.gd](sim/SimState.gd). The Seris-Demon-discount consumption pipeline through enemy AI is not wired (enemy AI doesn't currently cast Fiendish Pact in production); the field is set and observable, matching the test contract.\n\n3. **void_rift_lord enemy-side mana drain** — added `_enemy_void_mana_drain_pending: bool` to [CombatState.gd](combat/board/CombatState.gd). `EffectResolver.QUEUE_OPPONENT_MANA_DRAIN_NEXT_TURN` now sets the correct side based on `_opponent_of(ctx.owner)`. Consumed in [EnemyAI.run_turn](combat/board/EnemyAI.gd) after the mana refill, and in `SimState.begin_enemy_turn` for sim parity.\n\nTest updates: dropped the `(KNOWN BUG)` markers and the `assert_true(false)` placeholders in [CardEffectTests.gd](debug/tests/CardEffectTests.gd) and [TriggerHandlerTests.gd](debug/tests/TriggerHandlerTests.gd), replacing them with real assertions on the new fields. Also updated [design/TESTING.md](design/TESTING.md) to drop the \"7 KNOWN BUG failures are baseline\" guidance and switch the CI gate to assert exit 0.\n\nFull RunAllTests: **681 passed, 0 failed**."}, {"id": "\"035\"", "title": "Refactor Armour/AB damage math to a single signed net_armour value", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-16", "finished": "2026-05-16", "file": "035-refactor-armour-ab-to-signed-net.md", "body": "## Description\n\nCollapse the two-bucket Armour / Armour Break damage model in CombatManager into a single derived signed `net_armour = armour - sum(ARMOUR_BREAK)`. Positive net reduces incoming damage (capped so armour never reduces a hit below its raw value; 100 floor only when net actually reduced damage); negative net adds as flat bonus damage; zero passes raw through. Storage stays split (stat + buff stacks) so card triggers can still distinguish \"apply Armour\" from \"apply AB\" events. Wire damage math, Shield Bash, Decree of Ruin, and design doc §2 to the unified model. Minion status bar already renders the signed net via BoardSlot — confirm hero panels match, add probes for the small-damage-vs-armour case that currently inflates 50 ATK to 100.\n\n## Work log\n\n- 2026-05-16: opened.\n- 2026-05-16: closed.\n\n## Summary\n\nCollapsed Armour / Armour Break damage math into a unified signed-net model. Added `BuffSystem.net_armour(target)` helper; rewrote `CombatManager._apply_armour_math` to use `net = armour - sum(AB)` with three branches (positive net reduces damage but never below raw; negative net adds |net| as flat bonus; zero passes raw). Fixed a real bug: 50 ATK vs 200 Armour previously dealt 100 (floor inflated below-raw damage), now correctly deals 50. The 100 floor only applies when armour math reduces damage *above* the raw hit. Storage stays split (armour stat + ARMOUR_BREAK buff stacks) so card triggers can distinguish \"apply Armour\" vs \"apply AB\" events. Updated BoardSlot status bar to use the helper, added 4 new test probes (all 686 tests pass, +4 from 682), and rewrote design/KORRATH_HERO_DESIGN §2 with a worked-examples table and the canonical engine formula. Hero panels and minion status bar already render the signed-net display correctly."}, {"id": "\"036\"", "title": "Convert Formation from per-pair to one-shot consumable status", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-16", "finished": "2026-05-16", "file": "036-formation-one-shot-consumable.md", "body": "## Description\n\nReplace the existing pair-keyed Formation engine (`MinionInstance.formation_partners` dict, fires once per (actor, partner) pair) with a one-shot consumable model: Formation fires at most once per minion's lifetime — the first time a valid same-race adjacent partner is on board, it fires and the FORMATION status is consumed. Subsequent partners do nothing. Replace the dict with a single `formation_fired: bool`, update the handler to gate on it, hide the FORMATION keyword chip on the battlefield minion frame once consumed (big-card review view stays as-is), revise design doc §2 and the §10/§11/§12/§13 ruling-notes that currently lean on the per-pair model (Squire of the Order, Battle Drillmaster, Runebound Initiate dual-tag-flanked-twice ruling, Vanguard Marshal balance flag), and audit/extend the existing Formation tests for the new semantics.\n\n## Work log\n\n- 2026-05-16: opened.\n- 2026-05-16: closed.\n\n## Summary\n\nConverted Formation from per-pair memory (`MinionInstance.formation_partners: Dictionary`) to a one-shot consumable flag (`formation_fired: bool`). Once a FORMATION minion fires its effect for the first time, the status is consumed for the rest of that minion's lifetime — subsequent same-race partners coming and going cannot retrigger. Updated `_try_fire_formation` in CombatHandlers.gd to gate on the flag and refresh slot UI on consume so the FORMATION chip disappears from the battlefield frame (big-card review tooltip still shows the keyword as static card text). Added a FORMATION status chip in BoardSlot.gd that renders only while unconsumed, using `icon_guard.png` as a placeholder pending an art pass for a dedicated `icon_formation.png`. Rewrote design §2 and revised §10/§11/§12/§13 ruling notes (Squire of the Order, Battle Drillmaster, Vanguard Marshal balance flag, Runebound Initiate dual-tag-flank). Migrated 5 Formation probes in TriggerHandlerTests to `formation_fired` assertions; added new probes `_formation_consumed_once_per_lifetime` and `_formation_flanked_by_two_formation_partners_fires_all_three`.\n\nFollow-ups: dedicated `icon_formation.png` art asset (currently using `icon_guard.png` placeholder)."}, {"id": "\"037\"", "title": "Tighten Formation to require same-race minions on BOTH sides", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-16", "finished": "2026-05-16", "file": "037-formation-both-sides-required.md", "body": "## Description\n\nStrengthen the Formation trigger condition from \"at least one same-race adjacent neighbor\" to \"same-race minions present on BOTH the left and the right adjacent slots.\" The actor's race is checked independently against each side via `shares_race`, so dual-tag minions (e.g. Runebound Initiate, Squire of the Order) can have either tag satisfy each side. Edge-slot minions (slots 0 and N-1) become permanently unable to fire Formation normally — Battle Drillmaster becomes the only path to fire an edge-slot Formation. Trigger remains summon-event-keyed (same as task 036). This is a meaningful balance nerf to Knight T0 / Shield Bearer / Rank Breaker / Shield Squire / Squire of the Order / Initiate, doubling the positional setup required for any Formation effect. Update engine handler, design doc §2, all card design notes referencing the old single-neighbor rule, and add probes for the both-sides gate (one-side fail, edge-slot fail, dual-tag-mixed-races pass).\n\n## Work log\n\n- 2026-05-16: opened.\n- 2026-05-16: closed.\n\n## Summary\n\nTightened Formation trigger from \"at least one same-race adjacent neighbor\" to \"same-race partners on BOTH left and right adjacent slots.\" Added `_formation_both_sides_satisfied(actor, card)` helper in CombatHandlers.gd that checks `slot_index − 1` AND `slot_index + 1` are filled with race-matching partners via `shares_race` (so dual-tag actors can have either tag satisfy each side independently). Edge-slot minions (slot 0 or last slot) can never fire Formation normally — Battle Drillmaster bypass becomes the sole rescue path for edge Formations. Trigger remains summon-event-keyed (combined with task 036 one-shot consumption: an actor needs a summon event near it AND both-sides sandwich AND its own `formation_fired == false`). Rewrote 7 Formation tests to sandwich setups and migrated 4 B1 talent tests (iron_formation / commanders_reach / unbreakable variants) to pre-place a Human on both sides of the Knight; added 4 new probes (only-one-neighbor blocked, edge-slot impossibility, one-side-wrong-race blocked, dual-tag mixed-race-flanking passes). Revised §2 + the Knight T0 talent row + §10 Squire/Shield Bearer matrix rows + §11 Shield Bearer / Rank Breaker / Drillmaster notes + §12 Shield Squire + §13 Initiate notes to use sandwich language. Net balance: significantly harder to set up Formation triggers (roughly halved trigger frequency), Drillmaster becomes substantially more valuable. 695/695 tests pass."}, {"id": "\"038\"", "title": "Implement rally_the_ranks + adjacent-summon infra + dual-tag race picker", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-16", "finished": "2026-05-16", "file": "038-rally-the-ranks-adjacent-summon-infra.md", "body": "## Description\n\nSplit out from task 023 because Rally the Ranks (Korrath core spell §10) needs three new pieces of generic infrastructure: a `target_type` that accepts \"friendly Human OR Demon\" minions, a SUMMON step variant that places tokens into the two slots adjacent to a chosen target minion (instead of any free slot), and a runtime race-picker modal so the player can choose Human or Demon when the chosen target carries both tags (e.g. Abyssal Knight under runeforge_strike, or Squire of the Order). All three pieces must also work on the sim side so enemy AI / balance sims can resolve the spell. Card body itself is trivial; the infra is the work.\n\n## Work log\n\n- 2026-05-16: opened.\n- 2026-05-16: closed.\n\n## Summary\n\nShipped `rally_the_ranks` (2M Korrath core spell) plus all three pieces of reusable infrastructure split from task 023: (1) `friendly_human_or_demon` target_type added to Targeting validation + highlight wiring; (2) SUMMON step extended with `adjacent_to_target: bool` + `adjacent_side: \"left\"|\"right\"` fields, dispatched via new `_summon_token_at_slot` on both CombatScene and CombatState (refactored the existing `_summon_token` paths to share extracted `_spawn_token_into_slot[_vfx]` cores — no duplication); (3) generic dual-tag race-picker via `EffectContext.extra_cast_data: Dictionary` plumbed through `cast_player_targeted_spell` (live) and both `commit_play_spell` paths (sim), gated by new `ConditionResolver` conditions `rally_race_human`/`rally_race_demon`. Live combat shows a new programmatic `combat/ui/ChoiceModal.gd` (2–4 option modal, reusable for any future \"spell needs a runtime choice\" UX); sim falls back to `CombatState._rally_pick_race_for(owner)` heuristic (dominant friendly race, tie → demon). Rally itself is declared declaratively as 4 conditional SUMMON steps. Edge slots and occupied adjacent slots silently fizzle (\"up to 2\" semantics). Added `TestHarness.spawn_friendly_at` for slot-specific test setup. 729/729 tests pass (9 new Rally probes + 1 heuristic probe).\n\nFollow-ups: ChoiceModal styling is bare-bones (no theme, no animation) — polish pass when other modals join. The race-picker is hardcoded by `spell.id == \"rally_the_ranks\"` in `CombatScene._resolve_spell_extra_cast_data`; when a second spell needs a cast-time modal, refactor that switch into a per-spell registry. Sim AI doesn't currently cast Rally (no enemy deck holds it), but the plumbing and heuristic are ready when an enemy deck eventually does."}];
const STATE = { status: "active", area: "", q: "" };

// Tiny markdown renderer — handles headers, bold, italic, code, lists, links, paragraphs.
function md(src) {
  src = src.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  // fenced code
  src = src.replace(/```([\s\S]*?)```/g, (_, c) => "<pre><code>" + c.replace(/^\n/, "") + "</code></pre>");
  const lines = src.split("\n");
  const out = [];
  let inList = null; // "ul" | "ol" | null
  let para = [];
  const flushPara = () => { if (para.length) { out.push("<p>" + para.join(" ") + "</p>"); para = []; } };
  const closeList = () => { if (inList) { out.push("</" + inList + ">"); inList = null; } };
  for (const raw of lines) {
    const line = raw.replace(/\s+$/, "");
    if (!line.trim()) { flushPara(); closeList(); continue; }
    let m;
    if ((m = line.match(/^(#{1,3})\s+(.*)$/))) {
      flushPara(); closeList();
      out.push("<h" + m[1].length + ">" + inline(m[2]) + "</h" + m[1].length + ">");
    } else if ((m = line.match(/^[-*]\s+(.*)$/))) {
      flushPara();
      if (inList !== "ul") { closeList(); out.push("<ul>"); inList = "ul"; }
      out.push("<li>" + inline(m[1]) + "</li>");
    } else if ((m = line.match(/^\d+\.\s+(.*)$/))) {
      flushPara();
      if (inList !== "ol") { closeList(); out.push("<ol>"); inList = "ol"; }
      out.push("<li>" + inline(m[1]) + "</li>");
    } else if (line.startsWith("<pre>")) {
      flushPara(); closeList(); out.push(line);
    } else {
      closeList();
      para.push(inline(line));
    }
  }
  flushPara(); closeList();
  return out.join("\n");
}
function inline(s) {
  return s
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}

function populateAreas() {
  const sel = document.getElementById("area");
  const areas = [...new Set(TASKS.map(t => t.area).filter(Boolean))].sort();
  for (const a of areas) {
    const o = document.createElement("option"); o.value = a; o.textContent = a;
    sel.appendChild(o);
  }
}

function render() {
  const list = document.getElementById("list");
  const q = STATE.q.toLowerCase();
  let items = TASKS.filter(t => {
    if (STATE.status !== "all" && t.status !== STATE.status) return false;
    if (STATE.area && t.area !== STATE.area) return false;
    if (q && !(t.title.toLowerCase().includes(q) || t.body.toLowerCase().includes(q))) return false;
    return true;
  });
  // sort: done by finished desc; else started desc; fallback id desc
  items.sort((a, b) => {
    const ka = a.status === "done" ? a.finished : a.started;
    const kb = b.status === "done" ? b.finished : b.started;
    return (kb || "").localeCompare(ka || "") || (b.id || "").localeCompare(a.id || "");
  });
  document.getElementById("count").textContent = items.length + " task" + (items.length === 1 ? "" : "s");
  if (!items.length) { list.innerHTML = '<div class="empty">No tasks match.</div>'; return; }
  list.innerHTML = items.map(t => {
    const dates = t.status === "done" && t.finished
      ? t.finished
      : (t.started || "");
    return `
      <div class="task" data-id="${t.id}">
        <div class="task-head">
          <span class="id">${t.id}</span>
          <span class="title">${escapeHtml(t.title)}</span>
          ${t.area ? `<span class="pill">${escapeHtml(t.area)}</span>` : ""}
          <span class="pill status-${t.status}">${t.status}</span>
          <span class="dates">${dates}</span>
        </div>
        <div class="body">${md(t.body || "_(no body)_")}</div>
      </div>`;
  }).join("");
  for (const head of list.querySelectorAll(".task-head")) {
    head.addEventListener("click", () => head.nextElementSibling.classList.toggle("on"));
  }
}
function escapeHtml(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

document.getElementById("q").addEventListener("input", e => { STATE.q = e.target.value; render(); });
document.getElementById("area").addEventListener("change", e => { STATE.area = e.target.value; render(); });
for (const tab of document.querySelectorAll(".tab")) {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("on"));
    tab.classList.add("on");
    STATE.status = tab.dataset.status;
    render();
  });
}
populateAreas();
render();
</script>
