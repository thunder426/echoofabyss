<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Echo of Abyss — Task Tracker</title>
<style>
  :root {
    --bg: #1a1a1f; --panel: #23232a; --border: #33333d; --text: #e6e6ea;
    --muted: #8a8a96; --accent: #b48cff; --active: #6cd49a; --done: #6a6a76;
    --backlog: #d4a76c;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, system-ui, sans-serif;
         background: var(--bg); color: var(--text); }
  header { padding: 16px 24px; border-bottom: 1px solid var(--border);
           display: flex; align-items: center; gap: 16px; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .count { color: var(--muted); font-size: 13px; }
  .controls { padding: 12px 24px; border-bottom: 1px solid var(--border);
              display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .controls input, .controls select {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 10px; font: inherit;
  }
  .controls input { min-width: 240px; }
  .tabs { display: flex; gap: 4px; }
  .tab { background: transparent; color: var(--muted); border: 1px solid var(--border);
         border-radius: 4px; padding: 6px 12px; cursor: pointer; font: inherit; }
  .tab.on { background: var(--panel); color: var(--text); border-color: var(--accent); }
  main { padding: 16px 24px; max-width: 1100px; }
  .task { background: var(--panel); border: 1px solid var(--border);
          border-radius: 6px; margin-bottom: 8px; overflow: hidden; }
  .task-head { padding: 10px 14px; cursor: pointer; display: flex;
               align-items: center; gap: 10px; }
  .task-head:hover { background: #2a2a32; }
  .id { color: var(--muted); font-family: ui-monospace, monospace; font-size: 12px;
        min-width: 38px; }
  .title { flex: 1; font-weight: 500; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 10px;
          border: 1px solid var(--border); color: var(--muted); }
  .pill.status-active { color: var(--active); border-color: var(--active); }
  .pill.status-backlog { color: var(--backlog); border-color: var(--backlog); }
  .pill.status-done { color: var(--done); }
  .dates { color: var(--muted); font-size: 12px; min-width: 90px; text-align: right; }
  .body { padding: 0 14px 14px 60px; border-top: 1px solid var(--border);
          display: none; color: #cfcfd6; }
  .body.on { display: block; }
  .body h1, .body h2, .body h3 { color: var(--text); margin: 14px 0 6px; }
  .body h1 { font-size: 16px; } .body h2 { font-size: 14px; }
  .body h3 { font-size: 13px; color: var(--accent); }
  .body code { background: #2c2c34; padding: 1px 5px; border-radius: 3px;
               font-family: ui-monospace, monospace; font-size: 12px; }
  .body pre { background: #15151a; padding: 10px; border-radius: 4px; overflow-x: auto; }
  .body pre code { background: none; padding: 0; }
  .body ul, .body ol { padding-left: 22px; }
  .body a { color: var(--accent); }
  .empty { color: var(--muted); padding: 32px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>Echo of Abyss — Task Tracker</h1>
  <span class="count" id="count"></span>
</header>
<div class="controls">
  <input id="q" type="text" placeholder="search title or body…" autofocus>
  <select id="area"><option value="">all areas</option></select>
  <div class="tabs">
    <button class="tab on" data-status="active">Active</button>
    <button class="tab" data-status="backlog">Backlog</button>
    <button class="tab" data-status="done">Done</button>
    <button class="tab" data-status="all">All</button>
  </div>
</div>
<main id="list"></main>
<script>
const TASKS = [{"id": "\"000\"", "title": "Bootstrap local task tracker", "status": "done", "area": "meta", "priority": "normal", "started": "2026-05-06", "finished": "2026-05-06", "file": "000-bootstrap-tracker.md", "body": "## Description\n\nSet up a local, file-backed task tracker that AI tools (Claude Code) can manage and a human can review. Goal: lightweight Jira-alternative — markdown source of truth, HTML viewer, no server, no cloud.\n\n## Work log\n\n- 2026-05-06: agreed on the design — one markdown file per task in `tasks/`, `TASKS.md` index regenerated by a build script, self-contained `tasks.html` viewer.\n- 2026-05-06: wrote `build_tasks_html.py` (parses frontmatter, regenerates `TASKS.md` and `tasks.html`).\n- 2026-05-06: added `/task-start` and `/task-done` slash commands.\n- 2026-05-06: wired `PostToolUse` hook in `.claude/settings.json` so the HTML refreshes whenever a task file is edited.\n\n## Summary\n\nTracker is live. Schema: `id`, `title`, `status` (active/backlog/done), `area`, `priority`, `started`, `finished` in frontmatter; body has `## Description`, `## Work log`, `## Summary`. Use `/task-start <title>` to open, `/task-done <id>` to close. Open `tasks/tasks.html` in a browser to review."}, {"id": "\"001\"", "title": "Korrath Phase 1 — Armour, Armour Break, Formation core mechanics", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-06", "finished": "2026-05-06", "file": "001-korrath-phase-1-core-mechanics.md", "body": "## Description\n\nFoundation work for the Korrath hero: introduce the Armour stat (physical damage reduction with min-100 floor, spells bypass), the Armour Break stackable debuff (strips Armour first, overflow becomes flat physical damage), and the Formation keyword (one-time trigger per same-race adjacent pair). All three need full sim parity and test coverage in `CardEffectTests.gd` before any Korrath content is wired up.\n\n## Work log\n\n- 2026-05-06: opened. Plan derived from `design/KORRATH_HERO_DESIGN`. Touches `MinionInstance.gd`, `MinionCardData.gd`, `CombatManager._deal_damage`, `Enums.gd` (new `BuffType.ARMOUR_BREAK`, `Keyword.FORMATION`), `BuffSystem.gd`, plus symmetric handler registration in `CombatSetup.gd` and `SimTriggerSetup.gd`.\n- 2026-05-06: closed.\n\n## Summary\n\nShipped the three Korrath foundations: `armour: int` field on `MinionInstance` (with `add_armour()` helper that pre-wires Phase 3 T3 doubling via `scene._armour_doubled_on_knight`), `BuffType.ARMOUR_BREAK` as a stackable debuff routed through `BuffSystem` (also added to `DEBUFF_TYPES` for cleanse), and a keyword-driven `FORMATION` trigger in `CombatHandlers.on_minion_summoned_formation` registered as a shared always-on handler in `CombatSetup` (sim parity inherits via `SimTriggerSetup` delegation). `CombatManager._deal_damage` now applies the armour math (AB strips armour first, overflow becomes flat bonus damage, min-100 floor only when armour or AB is present, spells bypass entirely) and exposes `last_post_armour_damage` so PIERCE overkill carries the *landed* damage to the hero, not the raw atk value. 22 new test assertions in `DamageTypeTests` (Phase 8 — Korrath Armour) and `TriggerHandlerTests` (Formation section) all pass; pre-existing 543 assertions unchanged (3 KNOWN BUG failures predate this work).\n\nFollow-ups: Phase 2 (task 002) — register Korrath in `HeroDatabase`, add textless Abyssal Knight card, wire `iron_legion` 4-copy cap and `abyssal_commander` cost discount."}, {"id": "\"002\"", "title": "Korrath Phase 2 — hero registration and Abyssal Knight card", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-06", "finished": "2026-05-06", "file": "002-korrath-phase-2-hero-shell.md", "body": "## Description\n\nRegister Korrath in `HeroDatabase` with the `abyssal_commander` (knight costs 1 less) and `iron_legion` (up to 4 copies in deck) passives, plus the three branch IDs. Add the textless `abyssal_knight` card (4E / 400 / 500) to `CardDatabase` — base stats only, all behavior driven by talent overrides. Wire `iron_legion` into the deck-builder copy-cap rules and `abyssal_commander` into `CardModRules` cost_delta.\n\n## Work log\n\n- 2026-05-06: opened. Gated on Phase 1 (task 001). Files: `HeroDatabase.gd`, `DeckBuilderScene.gd:_EXTRA_COPY_RULES`, `CardModRules.gd`, `CardDatabase.gd`.\n- 2026-05-06: closed.\n\n## Summary\n\nKorrath is now a selectable hero. Registered `_register_korrath()` in `HeroDatabase` with `abyssal_commander` and `iron_legion` passives, plus the three branch IDs (`infernal_bulwark`, `runic_knight`, `abyssal_breaker`) — each branch gets a display name and one-line description in `TalentDatabase`. Added the textless `abyssal_knight` card (4E / 400 ATK / 500 HP, abyss_core pool, \"abyssal_knight\" tag) — `minion_type` defaults to DEMON since the field is required, but each branch's T0 talent override will replace it with the branch-appropriate race in Phase 3+. Wired `iron_legion` into `DeckBuilderScene._EXTRA_COPY_RULES` so the knight's deck cap is 4 instead of 2, and `abyssal_commander` into `CardModRules` as a tag-filtered `cost_delta: -1` rule (knight resolves at 3E in combat). 17 new test assertions added, all green; 543 pre-existing assertions unchanged.\n\nFollow-ups: art assets (portrait, combat portrait, knight art) — `art_path` is empty everywhere and the hero-select scene will fall back to placeholder rendering. Phase 3 (task 003) wires Branch 1 — Infernal Bulwark talents on top of this scaffolding."}, {"id": "\"003\"", "title": "Korrath Branch 1 — Infernal Bulwark talents", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-06", "finished": "2026-05-06", "file": "003-korrath-branch-1-infernal-bulwark.md", "body": "## Description\n\nImplement all four tiers of Branch 1 (Human formation / armour stacking / Guard capstone). T0 `iron_formation` makes the knight Human and grants Formation +200 Armour/+200 HP on first Human pair. T1 `commanders_reach` aura applies 100 Armour Break to attack targets via adjacent friendly Humans. T2 `iron_resolve` is a live passive — friendly Humans gain ATK = current Armour (derived in `MinionInstance.effective_atk`). T3 `unbreakable` capstone grants Guard and doubles all knight Armour gains.\n\n## Work log\n\n- 2026-05-06: opened. Gated on Phases 1 and 2. Mostly declarative via `talent_overrides` and `CardModRules`. T2 needs a scene flag pattern mirroring `corruption_inverts_on_friendly_demons`. T3 doubling needs a single `MinionInstance.add_armour()` helper to centralize armour mutations.\n- 2026-05-06: closed.\n\n## Summary\n\nAll four Infernal Bulwark talents shipped. T0 `iron_formation` and T3 `unbreakable` are pure declarative — `talent_overrides` on the Abyssal Knight set `minion_type=HUMAN`, FORMATION (and GUARD on T3) keywords, and `formation_effect_steps` (BUFF_ARMOUR +200 + BUFF_HP +200 SELF). T1 `commanders_reach` is a `ON_PLAYER_ATTACK` handler that applies 100 Armour Break to the defender when the attacker is a friendly Human adjacent to a friendly Abyssal Knight; T2 `iron_resolve` is a static flag on `MinionInstance` (mirroring Seris's corruption-inversion pattern) that adds the minion's current armour to its `effective_atk()` for friendly Humans. Three pieces of new infrastructure were needed: `EffectStep.BUFF_ARMOUR` (routes through the existing `add_armour()` helper so T3's doubling check stays centralized), `ON_PLAYER_ATTACK` is now actually fired from `CombatManager.resolve_minion_attack` / `resolve_minion_attack_hero` with a new `EventContext.defender` field, and `talent_overrides` keyword/array assignment now goes through the typed-array path (Godot 4 silently rejects untyped Array → Array[int] via `set()`). 15 new test assertions, all green; pre-existing 543 unchanged.\n\nFollow-ups: branch icon art (`icon_path` empty on all four talents). The `ON_PLAYER_ATTACK` infrastructure paves the way for Branch 3 T1 `abyssal_strike` (Corruption-on-attack) and T2 `path_of_destruction` (Demon-attacks-apply-AB) in task 004."}, {"id": "\"004\"", "title": "Korrath Branch 3 — Abyssal Breaker talents", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-06", "finished": "2026-05-06", "file": "004-korrath-branch-3-abyssal-breaker.md", "body": "## Description\n\nImplement all four tiers of Branch 3 (Demon knight / corruption strips Armour / Armour Break stacking / spell explosion capstone). T0 `corrupting_presence` retags the knight Demon and makes each corruption stack reduce target Armour by 100. T1 `abyssal_strike` applies 1 Corruption per knight attack (incl. enemy hero). T2 forks into sibling talents — `path_of_ruination` (spells apply Corruption + corruption amplifies spell damage by 100 per stack) and `path_of_destruction` (friendly Demon attacks apply 50 Armour Break). T3 `armour_explosion` capstone: on enemy minion death, deal spell damage equal to that minion's accumulated Armour Break to all enemies.\n\n## Work log\n\n- 2026-05-06: opened. Built before Branch 2 because corruption + AB are direct extensions of Phase 1, no new infra. T2 sibling-talent pattern (two IDs, only one selectable) is the model for Branch 2 T2 as well. T3 needs to snapshot dead minion's AB stacks before BuffSystem clears them.\n- 2026-05-06: closed.\n\n## Summary\n\nAll five Abyssal Breaker talents shipped. T0 `corrupting_presence` retags the knight Demon (declarative `talent_overrides`) and adds a corruption-as-armour-erosion path to `CombatManager._deal_damage` (gated by `_corrupting_presence_active`, player-side only — counts CORRUPTION buff entries via `count_type`, not `sum_type`, since each entry stores per-stack ATK penalty as `amount`). T1 `abyssal_strike` and T2 `path_of_destruction` are `ON_PLAYER_ATTACK` handlers that filter on attacker (knight / Demon) and apply Corruption / 50 AB to the defender. T2 `path_of_ruination` lives entirely in `EffectResolver._apply` for `DAMAGE_MINION` — pre-damage amplification reads target's pre-application Corruption stack count (+100/stack), post-damage application adds 1 stack (skipped if the target died); this also makes AOE spells naturally hit each target once. T3 `armour_explosion` snapshots the dead enemy's AB sum on `ON_ENEMY_MINION_DIED` and deals it as spell damage to the remaining enemy board. Sibling T2 talents (path_of_ruination + path_of_destruction) both require T1 and both belong to `abyssal_breaker` branch; the four-pick budget naturally limits the player to one. 14 new test assertions, all green; pre-existing 578 unchanged.\n\nFollow-ups: branch icon art (all `icon_path` empty). Hero AB / Corruption is not modeled (handler no-ops on hero defenders) — design says abyssal_strike applies Corruption to the enemy hero too; revisit when hero-state expands. T3 prereq is `abyssal_strike` not either T2 sibling because `TalentData.requires` holds a single string — fragile if a player skips T2, but the four-pick budget makes it unlikely in practice."}, {"id": "\"005\"", "title": "Korrath Branch 2 — Runic Knight talents (T3 deferred)", "status": "done", "area": "combat", "priority": "normal", "started": "2026-05-06", "finished": "2026-05-06", "file": "005-korrath-branch-2-runic-knight.md", "body": "## Description\n\nMost complex branch. T0 `runic_transcendence` gives the knight both Human and Demon race tags and places a random Rune on attack — needs an architectural decision on whether `MinionInstance.minion_type` becomes a flag-set / array (audit every `== MinionType.X` read site) or we add a parallel `extra_types` field. T1 `runic_absorption` destroys a random rune when board is full and grants its aura permanently to a random Abyssal Knight (reuses Seris's `aura_tags` accumulator pattern). T2 sibling talents: `path_of_demons` (Demon summon → 50 dmg × X repeated X times) and `path_of_humans` (Human summon → +50 ATK × X repeated X times) where X = active rune slots + total absorbed aura stacks across knights.\n\nT3 `grand_ritual_chaos` is **deferred** — needs a new `RitualVariance` resource type with min/max ranges per effect and post-resolution Enhanced selection. Will spin out into its own task.\n\n## Work log\n\n- 2026-05-06: opened. Gated on Phases 1, 2, and ideally task 004 (sibling-talent T2 pattern). Dual-race tagging is the architectural hinge — flag scope to user before committing.\n- 2026-05-06: closed.\n\n## Summary\n\nT0/T1/T2 of Branch 2 shipped; T3 grand_ritual_chaos still deferred. The architectural hinge — dual-race tagging — was resolved by adding `extra_minion_types: Array[int]` and an `is_race(type)` / `shares_race(other)` helper to `MinionCardData`, then migrating ~60 `minion_type ==`/`!=` call sites across combat, effects, sim, AI profiles, and CardModRules to use `is_race()`. The migration ran clean with zero regressions in the existing 592-assertion suite, which validates that the helper is the right primitive. T0 `runic_transcendence` is two halves: declarative `talent_overrides` add DEMON to the knight's `extra_minion_types`, and an `ON_PLAYER_ATTACK` handler places a random rune via the new `CombatState._korrath_place_random_rune()`. T1 `runic_absorption` plugs into that helper — when the rune board is full it picks a random active rune, removes it (full aura cleanup via existing `_remove_rune_aura`), and appends its rune id to a random friendly knight's `aura_tags` (Seris's accumulator pattern). T2 sibling talents `path_of_demons` and `path_of_humans` listen on `ON_PLAYER_MINION_SUMMONED` and fire 50 dmg / +50 ATK in a loop scaled by X = active rune slots + total absorbed-aura stacks across friendly knights. 17 new test assertions, all green; 592 pre-existing unchanged.\n\nFollow-ups: T3 `grand_ritual_chaos` capstone needs a new `RitualVariance` resource type with min/max ranges per effect and post-resolution Enhanced selection — open a fresh task when ready. Branch icon art is also still empty across all four talents. Hero-target rune placement / hero corruption gaps from earlier branches still apply."}, {"id": "\"006\"", "title": "Korrath balance pass and polish", "status": "backlog", "area": "balance", "priority": "normal", "started": "", "finished": "", "file": "006-korrath-balance-pass.md", "body": "## Description\n\nOnce all three branches are implemented, run the full balance sim matrix (`BalanceSimBatch.tscn`) across Act 1 and Act 2 with Korrath profiles, identify outlier branches/talents, and tune numbers. Also: branch icon art (via `/add-art`), Korrath portrait, and basic starter-deck wiring (Human-leaning and Demon-leaning presets per the design doc). Support card pool design stays out of scope — that's a separate design pass.\n\n## Work log\n\n- 2026-05-06: opened. Final polish phase, gated on all prior Korrath tasks.\n\n## Summary\n\n_(filled in at /task-done)_"}];
const STATE = { status: "active", area: "", q: "" };

// Tiny markdown renderer — handles headers, bold, italic, code, lists, links, paragraphs.
function md(src) {
  src = src.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  // fenced code
  src = src.replace(/```([\s\S]*?)```/g, (_, c) => "<pre><code>" + c.replace(/^\n/, "") + "</code></pre>");
  const lines = src.split("\n");
  const out = [];
  let inList = null; // "ul" | "ol" | null
  let para = [];
  const flushPara = () => { if (para.length) { out.push("<p>" + para.join(" ") + "</p>"); para = []; } };
  const closeList = () => { if (inList) { out.push("</" + inList + ">"); inList = null; } };
  for (const raw of lines) {
    const line = raw.replace(/\s+$/, "");
    if (!line.trim()) { flushPara(); closeList(); continue; }
    let m;
    if ((m = line.match(/^(#{1,3})\s+(.*)$/))) {
      flushPara(); closeList();
      out.push("<h" + m[1].length + ">" + inline(m[2]) + "</h" + m[1].length + ">");
    } else if ((m = line.match(/^[-*]\s+(.*)$/))) {
      flushPara();
      if (inList !== "ul") { closeList(); out.push("<ul>"); inList = "ul"; }
      out.push("<li>" + inline(m[1]) + "</li>");
    } else if ((m = line.match(/^\d+\.\s+(.*)$/))) {
      flushPara();
      if (inList !== "ol") { closeList(); out.push("<ol>"); inList = "ol"; }
      out.push("<li>" + inline(m[1]) + "</li>");
    } else if (line.startsWith("<pre>")) {
      flushPara(); closeList(); out.push(line);
    } else {
      closeList();
      para.push(inline(line));
    }
  }
  flushPara(); closeList();
  return out.join("\n");
}
function inline(s) {
  return s
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}

function populateAreas() {
  const sel = document.getElementById("area");
  const areas = [...new Set(TASKS.map(t => t.area).filter(Boolean))].sort();
  for (const a of areas) {
    const o = document.createElement("option"); o.value = a; o.textContent = a;
    sel.appendChild(o);
  }
}

function render() {
  const list = document.getElementById("list");
  const q = STATE.q.toLowerCase();
  let items = TASKS.filter(t => {
    if (STATE.status !== "all" && t.status !== STATE.status) return false;
    if (STATE.area && t.area !== STATE.area) return false;
    if (q && !(t.title.toLowerCase().includes(q) || t.body.toLowerCase().includes(q))) return false;
    return true;
  });
  // sort: done by finished desc; else started desc; fallback id desc
  items.sort((a, b) => {
    const ka = a.status === "done" ? a.finished : a.started;
    const kb = b.status === "done" ? b.finished : b.started;
    return (kb || "").localeCompare(ka || "") || (b.id || "").localeCompare(a.id || "");
  });
  document.getElementById("count").textContent = items.length + " task" + (items.length === 1 ? "" : "s");
  if (!items.length) { list.innerHTML = '<div class="empty">No tasks match.</div>'; return; }
  list.innerHTML = items.map(t => {
    const dates = t.status === "done" && t.finished
      ? t.finished
      : (t.started || "");
    return `
      <div class="task" data-id="${t.id}">
        <div class="task-head">
          <span class="id">${t.id}</span>
          <span class="title">${escapeHtml(t.title)}</span>
          ${t.area ? `<span class="pill">${escapeHtml(t.area)}</span>` : ""}
          <span class="pill status-${t.status}">${t.status}</span>
          <span class="dates">${dates}</span>
        </div>
        <div class="body">${md(t.body || "_(no body)_")}</div>
      </div>`;
  }).join("");
  for (const head of list.querySelectorAll(".task-head")) {
    head.addEventListener("click", () => head.nextElementSibling.classList.toggle("on"));
  }
}
function escapeHtml(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

document.getElementById("q").addEventListener("input", e => { STATE.q = e.target.value; render(); });
document.getElementById("area").addEventListener("change", e => { STATE.area = e.target.value; render(); });
for (const tab of document.querySelectorAll(".tab")) {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("on"));
    tab.classList.add("on");
    STATE.status = tab.dataset.status;
    render();
  });
}
populateAreas();
render();
</script>
</body>
</html>
